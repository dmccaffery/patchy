#
# Two Services, because only two things are dialled by anything:
#
#   * <fullname>-integration-controller:8080 — the single internet-facing
#     entry point (the provider webhook receivers, e.g. POST
#     /github/webhooks). Fronted by `webhook.ingress` / `webhook.httpRoute`.
#   * <fullname>-source-controller:9790 — the artifact server the agent pods
#     fetch SHA-pinned repository tarballs from (in-cluster only; the
#     NetworkPolicies restrict it to the agent namespace).
#
# The other controllers serve nothing but kubelet probes on :8081, which hit
# the pod directly — no Service needed. type NodePort + nodePort covers the
# kind/dev case.
{{- range $c := list
    (dict "name" "integration-controller" "vals" .Values.integrationController "portName" "http")
    (dict "name" "source-controller" "vals" .Values.sourceController "portName" "artifact")
}}
{{- $svc := $c.vals.service }}
---
apiVersion: v1
kind: Service
metadata:
    name: {{ include "patchy.fullname" $ }}-{{ $c.name }}
    namespace: {{ $.Release.Namespace }}
    labels:
        {{- include "patchy.labels" (dict "root" $ "name" $c.name) | nindent 8 }}
    {{- with include "patchy.annotations" (dict "root" $ "extra" $svc.annotations) }}
    annotations:
        {{- . | nindent 8 }}
    {{- end }}
spec:
    type: {{ $svc.type }}
    selector:
        {{- include "patchy.selectorLabels" (dict "root" $ "name" $c.name) | nindent 8 }}
    ports:
        - name: {{ $c.portName }}
          port: {{ $svc.port }}
          targetPort: {{ $c.portName }}
          protocol: TCP
          {{- with $svc.nodePort }}
          nodePort: {{ . }}
          {{- end }}
{{- end }}
