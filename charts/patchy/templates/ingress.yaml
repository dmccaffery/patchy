#
# The webhook entry point, plain-Ingress flavour (webhook.ingress): one
# Ingress on one hostname, in front of the integration-controller — the only
# component that faces the internet; it validates each delivery against the
# matching Integration's webhookSecret. GitHub only POSTs /github/webhooks
# and the HMAC signature check is the authentication, so the rule is scoped
# to /github/webhooks rather than exposing the probes too. See
# docs/deployment/webhook.md.
{{- if .Values.webhook.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
    name: {{ include "patchy.fullname" . }}-webhook
    namespace: {{ .Release.Namespace }}
    labels:
        {{- include "patchy.labels" (dict "root" . "name" "integration-controller") | nindent 8 }}
    {{- with include "patchy.annotations" (dict "root" . "extra" .Values.webhook.ingress.annotations) }}
    annotations:
        {{- . | nindent 8 }}
    {{- end }}
spec:
    {{- with .Values.webhook.ingress.className }}
    ingressClassName: {{ . }}
    {{- end }}
    {{- with .Values.webhook.ingress.tls }}
    tls:
        {{- toYaml . | nindent 8 }}
    {{- end }}
    rules:
        - host: {{ required "webhook.host is required when webhook.ingress is enabled" .Values.webhook.host | quote }}
          http:
              paths:
                  - path: /github/webhooks
                    pathType: Prefix
                    backend:
                        service:
                            name: {{ include "patchy.fullname" . }}-integration-controller
                            port:
                                name: http
{{- end }}
