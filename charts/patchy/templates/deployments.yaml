#
# One Deployment per controller, rendered from a single spec because they
# differ only in image, resources, config, and ports: the
# integration-controller additionally serves the provider webhook receivers
# on 8080, the source-controller the artifact tarballs on 9790 (backed by a
# /data emptyDir); every controller serves healthz/readyz on 8081. All five
# are CRD controllers, so every pod mounts its service-account token —
# rbac.yaml pins verb-by-verb what each identity may do.
#
# All five are singletons with strategy Recreate, ON PURPOSE. The binaries do
# run leader election (a coordination.k8s.io Lease), but that is insurance
# against a botched rollout racing two replicas — singleton-by-construction
# stays the deployment model. Do not scale these.
#
# No credential is mounted anywhere here: provider and forge credentials live
# in Secrets referenced by the Integration and Forge custom resources
# (spec.secretRef), read on demand through the API.
{{- range $c := list
    (dict "name" "integration-controller" "vals" .Values.integrationController)
    (dict "name" "source-controller" "vals" .Values.sourceController)
    (dict "name" "context-controller" "vals" .Values.contextController)
    (dict "name" "investigation-controller" "vals" .Values.investigationController)
    (dict "name" "remediation-controller" "vals" .Values.remediationController)
}}
---
apiVersion: apps/v1
kind: Deployment
metadata:
    name: {{ include "patchy.fullname" $ }}-{{ $c.name }}
    namespace: {{ $.Release.Namespace }}
    labels:
        {{- include "patchy.labels" (dict "root" $ "name" $c.name "component" "controller") | nindent 8 }}
    {{- with include "patchy.annotations" (dict "root" $) }}
    annotations:
        {{- . | nindent 8 }}
    {{- end }}
spec:
    replicas: 1
    strategy:
        type: Recreate
    selector:
        matchLabels:
            {{- include "patchy.selectorLabels" (dict "root" $ "name" $c.name) | nindent 12 }}
    template:
        metadata:
            labels:
                {{- include "patchy.labels" (dict "root" $ "name" $c.name "component" "controller") | nindent 16 }}
                {{- with $c.vals.podLabels }}
                {{- toYaml . | nindent 16 }}
                {{- end }}
            {{- with include "patchy.annotations" (dict "root" $ "extra" $c.vals.podAnnotations) }}
            annotations:
                {{- . | nindent 16 }}
            {{- end }}
        spec:
            serviceAccountName: {{ include "patchy.serviceAccountName" (dict "root" $ "name" $c.name "vals" $c.vals) }}
            {{- with $.Values.image.pullSecrets }}
            imagePullSecrets:
                {{- toYaml . | nindent 16 }}
            {{- end }}
            securityContext:
                runAsNonRoot: true
                runAsUser: 65532
                runAsGroup: 65532
                fsGroup: 65532
                fsGroupChangePolicy: Always
                seccompProfile:
                    type: RuntimeDefault
            containers:
                - name: controller
                  image: {{ include "patchy.image" (dict "root" $ "binary" $c.name "image" $c.vals.image) }}
                  imagePullPolicy: {{ $.Values.image.pullPolicy }}
                  args: ["serve"]
                  envFrom:
                      - configMapRef:
                            name: {{ include "patchy.configMapName" (dict "root" $ "name" $c.name) }}
                  env:
                      - name: POD_NAMESPACE
                        valueFrom:
                            fieldRef:
                                fieldPath: metadata.namespace
                  ports:
                      {{- if eq $c.name "integration-controller" }}
                      - name: http
                        containerPort: 8080
                        protocol: TCP
                      {{- else if eq $c.name "source-controller" }}
                      - name: artifact
                        containerPort: 9790
                        protocol: TCP
                      {{- end }}
                      - name: health
                        containerPort: 8081
                        protocol: TCP
                  livenessProbe:
                      httpGet:
                          path: /healthz
                          port: health
                      initialDelaySeconds: 5
                      periodSeconds: 20
                  readinessProbe:
                      httpGet:
                          path: /readyz
                          port: health
                      initialDelaySeconds: 2
                      periodSeconds: 10
                  {{- with $c.vals.resources }}
                  resources:
                      {{- toYaml . | nindent 22 }}
                  {{- end }}
                  securityContext:
                      allowPrivilegeEscalation: false
                      readOnlyRootFilesystem: true
                      capabilities:
                          drop: ["ALL"]
                      seccompProfile:
                          type: RuntimeDefault
                  volumeMounts:
                      {{- if eq $c.name "source-controller" }}
                      - name: data
                        mountPath: /data
                      {{- end }}
                      - name: tmp
                        mountPath: /tmp
            {{- with $c.vals.nodeSelector }}
            nodeSelector:
                {{- toYaml . | nindent 16 }}
            {{- end }}
            {{- with $c.vals.tolerations }}
            tolerations:
                {{- toYaml . | nindent 16 }}
            {{- end }}
            {{- with $c.vals.affinity }}
            affinity:
                {{- toYaml . | nindent 16 }}
            {{- end }}
            volumes:
                {{- if eq $c.name "source-controller" }}
                # Artifact storage (PATCHY_ARTIFACT_DIR=/data/artifacts).
                # Artifacts are reproducible — a re-fetch at the pinned SHA
                # rebuilds them — so an emptyDir is acceptable.
                - name: data
                  emptyDir: {}
                {{- end }}
                # The root filesystem is read-only; every binary wants a
                # writable /tmp.
                - name: tmp
                  emptyDir: {}
{{- end }}
