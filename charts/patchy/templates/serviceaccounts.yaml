#
# One ServiceAccount per controller (<controller>.serviceAccount). Every
# controller is a Kubernetes controller now — the CRs in the release
# namespace are the state machine — so every controller identity mounts its
# token. What each identity may do is pinned, verb by verb, in rbac.yaml.
{{- range $c := list
    (dict "name" "integration-controller" "vals" .Values.integrationController)
    (dict "name" "source-controller" "vals" .Values.sourceController)
    (dict "name" "context-controller" "vals" .Values.contextController)
    (dict "name" "investigation-controller" "vals" .Values.investigationController)
    (dict "name" "remediation-controller" "vals" .Values.remediationController)
}}
{{- if $c.vals.serviceAccount.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
    name: {{ include "patchy.serviceAccountName" (dict "root" $ "name" $c.name "vals" $c.vals) }}
    namespace: {{ $.Release.Namespace }}
    labels:
        {{- include "patchy.labels" (dict "root" $ "name" $c.name) | nindent 8 }}
    {{- with include "patchy.annotations" (dict "root" $ "extra" $c.vals.serviceAccount.annotations) }}
    annotations:
        {{- . | nindent 8 }}
    {{- end }}
{{- end }}
{{- end }}
---
# The identity the agent Job pods run as (PATCHY_AGENT_SERVICE_ACCOUNT). The
# agent needs NO Kubernetes API access whatsoever, so no Role is bound to it
# and its token is not mounted — a prompt-injected agent must not be able to
# read the very Secrets the isolation model depends on.
apiVersion: v1
kind: ServiceAccount
metadata:
    name: {{ .Values.agent.serviceAccount }}
    namespace: {{ .Values.agent.namespace }}
    labels:
        {{- include "patchy.labels" (dict "root" . "name" "patchy-agent") | nindent 8 }}
    {{- with include "patchy.annotations" (dict "root" .) }}
    annotations:
        {{- . | nindent 8 }}
    {{- end }}
automountServiceAccountToken: false
