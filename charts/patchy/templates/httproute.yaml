#
# The webhook entry point, Gateway API flavour (webhook.httpRoute): one
# HTTPRoute on one hostname, in front of the integration-controller — the
# only component that faces the internet; it validates each delivery against
# the matching Integration's webhookSecret. The path is fixed to
# /github/webhooks on purpose: that is the only endpoint GitHub needs, and
# the probes stay cluster-internal. Requires the Gateway API CRDs and a
# Gateway to attach to via parentRefs — see docs/deployment/webhook.md.
{{- if .Values.webhook.httpRoute.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
    name: {{ include "patchy.fullname" . }}-webhook
    namespace: {{ .Release.Namespace }}
    labels:
        {{- include "patchy.labels" (dict "root" . "name" "integration-controller") | nindent 8 }}
    {{- with include "patchy.annotations" (dict "root" . "extra" .Values.webhook.httpRoute.annotations) }}
    annotations:
        {{- . | nindent 8 }}
    {{- end }}
spec:
    {{- with .Values.webhook.httpRoute.parentRefs }}
    parentRefs:
        {{- toYaml . | nindent 8 }}
    {{- end }}
    hostnames:
        - {{ required "webhook.host is required when webhook.httpRoute is enabled" .Values.webhook.host | quote }}
    rules:
        - matches:
              - path:
                    type: PathPrefix
                    value: /github/webhooks
          backendRefs:
              - name: {{ include "patchy.fullname" . }}-integration-controller
                port: {{ .Values.integrationController.service.port }}
{{- end }}
