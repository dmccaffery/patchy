#
# Defence in depth for the agent sandbox on Cilium CNIs: FQDN matching on top
# of the base "TCP 443 anywhere" NetworkPolicy. Requires Cilium with
# DNS-based policy enabled (the DNS proxy). One policy is rendered per enabled
# runner, selecting that harness's pods by their harness label, so a claude pod
# may reach only api.anthropic.com and a codex pod only api.openai.com.
#
# Each runner's pods need exactly two destinations:
#
#   * source-controller's artifact server (in-cluster, port 9790): the init
#     container's credential-less, digest-verified tarball fetch. No forge
#     host appears in this policy at all — the pod never talks to GitHub.
#   * the runner's own model API (agent.runners.<harness>.hosts): the agent
#     container's harness CLI.
#
# If your CNI is not Cilium, leave this disabled; the base NetworkPolicy
# still applies and is the floor. See deploy/kustomize/components/cilium.
#
# NOT FOR GKE. Dataplane V2 is Cilium, but it ignores this CRD and rejects
# every L7 rule, so a policy rendered there enforces nothing while looking
# like it does — use mode `gke` (networkpolicy-gke.yaml) instead. `mode: auto`
# never picks cilium on a GKE cluster for exactly this reason; setting
# `mode: cilium` explicitly is trusted, for a self-managed Cilium on GKE
# without Dataplane V2.
#
# Under this mode the base agent-egress NetworkPolicy is not rendered at all
# (see networkpolicy.yaml): policies are additive, so its DNS and 443 rules
# would union with — and undo — what this one restricts. Everything the pod
# needs is below, and the namespace default-deny remains the floor, so a
# missing CRD fails closed.
{{- if and .Values.agent.networkPolicy.create (eq (include "patchy.egressMode" .) "cilium") }}
{{- $root := . }}
{{- $clusterDNS := .Values.agent.networkPolicy.clusterDNSPatterns | default list }}
{{- range $id, $r := .Values.agent.runners }}
{{- if $r.enabled }}
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
    name: {{ include "patchy.fullname" $root }}-agent-egress-{{ $id }}
    namespace: {{ $root.Values.agent.namespace }}
    labels:
        {{- include "patchy.labels" (dict "root" $root "name" "patchy-agents") | nindent 8 }}
    {{- with include "patchy.annotations" (dict "root" $root) }}
    annotations:
        {{- . | nindent 8 }}
    {{- end }}
spec:
    endpointSelector:
        matchLabels:
            {{- include "patchy.agentPodSelector" $root | nindent 12 }}
            patchy.bitwisemedia.uk/harness: {{ $id | quote }}
    egress:
        # DNS via Cilium's proxy — this is what makes toFQDNs work at all:
        # the proxy watches the answers and programs the resolved IPs into
        # the policy. Only this runner's model host and the cluster-local
        # names (for the artifact fetch) may be resolved.
        - toEndpoints:
              - matchLabels:
                    io.kubernetes.pod.namespace: kube-system
                    k8s-app: kube-dns
          toPorts:
              - ports:
                    - port: "53"
                      protocol: ANY
                rules:
                    dns:
                        {{- range concat ($r.dnsPatterns | default list) $clusterDNS }}
                        - matchPattern: {{ . | quote }}
                        {{- end }}

        # The INIT container's artifact fetch: source-controller's tarball
        # server, in-cluster, credential-less, digest-verified.
        - toEndpoints:
              - matchLabels:
                    io.kubernetes.pod.namespace: {{ $root.Release.Namespace }}
                    app.kubernetes.io/name: source-controller
          toPorts:
              - ports:
                    - port: "9790"
                      protocol: TCP

        # The agent container: this runner's model API and nothing else.
        - toFQDNs:
              {{- range $r.hosts | default list }}
              - matchName: {{ . | quote }}
              {{- end }}
          toPorts:
              - ports:
                    - port: "443"
                      protocol: TCP
{{- end }}
{{- end }}
{{- end }}
