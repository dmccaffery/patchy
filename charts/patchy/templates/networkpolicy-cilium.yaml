#
# Defence in depth for the agent sandbox on Cilium CNIs: FQDN matching on top
# of the base "TCP 443 anywhere" NetworkPolicy. Requires Cilium with
# DNS-based policy enabled (the DNS proxy).
#
# The agent pod needs exactly two destinations:
#
#   * source-controller's artifact server (in-cluster, port 9790): the init
#     container's credential-less, digest-verified tarball fetch. No forge
#     host appears in this policy at all — the pod never talks to GitHub.
#   * api.anthropic.com: the agent container's `claude -p`.
#
# If your CNI is not Cilium, leave this disabled; the base NetworkPolicy
# still applies and is the floor. See deploy/kustomize/components/cilium.
{{- if and .Values.agent.networkPolicy.create .Values.agent.networkPolicy.cilium.enabled }}
{{- $hosts := .Values.agent.networkPolicy.hosts }}
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
    name: {{ include "patchy.fullname" . }}-agent-egress
    namespace: {{ .Values.agent.namespace }}
    labels:
        {{- include "patchy.labels" (dict "root" . "name" "patchy-agents") | nindent 8 }}
    {{- with include "patchy.annotations" (dict "root" .) }}
    annotations:
        {{- . | nindent 8 }}
    {{- end }}
spec:
    endpointSelector:
        matchLabels:
            {{- include "patchy.agentPodSelector" . | nindent 12 }}
    egress:
        # DNS via Cilium's proxy — this is what makes toFQDNs work at all:
        # the proxy watches the answers and programs the resolved IPs into
        # the policy. Only the patterns below may be resolved.
        - toEndpoints:
              - matchLabels:
                    io.kubernetes.pod.namespace: kube-system
                    k8s-app: kube-dns
          toPorts:
              - ports:
                    - port: "53"
                      protocol: ANY
                rules:
                    dns:
                        {{- range $hosts.dnsPatterns }}
                        - matchPattern: {{ . | quote }}
                        {{- end }}

        # The INIT container's artifact fetch: source-controller's tarball
        # server, in-cluster, credential-less, digest-verified.
        - toEndpoints:
              - matchLabels:
                    io.kubernetes.pod.namespace: {{ .Release.Namespace }}
                    app.kubernetes.io/name: source-controller
          toPorts:
              - ports:
                    - port: "9790"
                      protocol: TCP

        # The agent container: `claude -p` and nothing else.
        - toFQDNs:
              {{- range $hosts.anthropic }}
              - matchName: {{ . | quote }}
              {{- end }}
          toPorts:
              - ports:
                    - port: "443"
                      protocol: TCP
{{- end }}
