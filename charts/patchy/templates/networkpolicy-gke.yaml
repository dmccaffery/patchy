#
# Defence in depth for the agent sandbox on GKE Dataplane V2: the same
# per-runner hostname allowlist the Cilium component renders, in the dialect
# GKE actually enforces. Dataplane V2 is Cilium underneath, but it has not
# honoured the CiliumNetworkPolicy CRD since 1.21.5-gke.1300 and rejects every
# L7 rule — so `toFQDNs` is not available and networkpolicy-cilium.yaml is
# inert there. FQDNNetworkPolicy (networking.gke.io/v1alpha1) is the
# equivalent: anetd snoops the pod's DNS answers and programs the resolved
# addresses, the same trick Cilium's DNS proxy plays.
#
# REQUIREMENTS — the cluster must be created or updated with
# `--enable-fqdn-network-policy` (Dataplane V2 plus kube-dns or Cloud DNS; on
# Standard clusters restart the anetd DaemonSet afterwards). The CRD only
# exists once that flag is on, which is what makes `mode: auto` detection
# honest rather than a guess.
#
# Two differences from the Cilium policy, both structural:
#
#   * There is no DNS rule here. FQDNNetworkPolicy is egress-only and cannot
#     name a resolver; the base NetworkPolicy's kube-system DNS rule is what
#     lets the pod resolve at all, and Dataplane V2 reads those same answers.
#     agent.networkPolicy.clusterDNSPatterns is therefore Cilium-only.
#   * There is no artifact-server rule. FQDN policies cannot select a
#     ClusterIP or headless Service, so the init container's tarball fetch is
#     granted by the base NetworkPolicy — which is why that policy still
#     renders under this mode (minus its broad 443 rule).
#
# Only `hosts` feeds this policy, never dnsPatterns: a `pattern:` match would
# widen the allowlist past the exact model API, and the wildcard only matches
# one label anyway. See deploy/kustomize/components/gke-fqdn.
{{- if and .Values.agent.networkPolicy.create (eq (include "patchy.egressMode" .) "gke") }}
{{- $root := . }}
{{- range $id, $r := .Values.agent.runners }}
{{- if $r.enabled }}
---
apiVersion: networking.gke.io/v1alpha1
kind: FQDNNetworkPolicy
metadata:
    name: {{ include "patchy.fullname" $root }}-agent-egress-{{ $id }}
    namespace: {{ $root.Values.agent.namespace }}
    labels:
        {{- include "patchy.labels" (dict "root" $root "name" "patchy-agents") | nindent 8 }}
    {{- with include "patchy.annotations" (dict "root" $root) }}
    annotations:
        {{- . | nindent 8 }}
    {{- end }}
spec:
    podSelector:
        matchLabels:
            {{- include "patchy.agentPodSelector" $root | nindent 12 }}
            patchy.bitwisemedia.uk/harness: {{ $id | quote }}
    egress:
        # This runner's model API and nothing else. A claude pod reaches only
        # api.anthropic.com, a codex pod only api.openai.com; no forge host
        # appears in any of them, because the pod never talks to GitHub.
        - matches:
              {{- range $r.hosts | default list }}
              - name: {{ . | quote }}
              {{- end }}
          ports:
              - protocol: TCP
                port: 443
{{- end }}
{{- end }}
{{- end }}
