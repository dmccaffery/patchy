#
# The agent sandbox. Ephemeral Jobs created at runtime by the two job
# controllers (internal/jobs). Nothing here holds a forge credential at all —
# the per-Job Secret carries only handoff markdown (garbage-collected with
# its Job), and the repository arrives as a credential-less tarball from
# source-controller's artifact server.
#
# NOTE: helm uninstall deletes this namespace — and with it any agent Job
# still running. The controllers' namespace is the release namespace and is
# never chart-managed.
{{- if .Values.agent.createNamespace }}
apiVersion: v1
kind: Namespace
metadata:
    name: {{ .Values.agent.namespace }}
    labels:
        {{- include "patchy.labels" (dict "root" . "name" "patchy-agents") | nindent 8 }}
        pod-security.kubernetes.io/enforce: restricted
        pod-security.kubernetes.io/audit: restricted
        pod-security.kubernetes.io/warn: restricted
        {{- if .Values.agent.networkPolicy.istio.enabled }}
        {{ .Values.agent.networkPolicy.istio.injectionLabel }}: {{ .Values.agent.networkPolicy.istio.injectionValue }}
        {{- end }}
    {{- with include "patchy.annotations" (dict "root" .) }}
    annotations:
        {{- . | nindent 8 }}
    {{- end }}
{{- end }}
