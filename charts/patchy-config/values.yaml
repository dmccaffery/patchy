#
# The pipeline switch-on, split out of the patchy chart on purpose: Helm
# validates every manifest in a release against the API server before applying
# anything, so a chart cannot install a CRD and a custom resource of that CRD
# in the same first release — the CR fails validation before the CRD exists.
# Install the patchy chart (the CRDs and controllers) first, then this chart.
# The referenced Secrets are created out of band — see the chart README and
# deploy/kustomize/base/secrets.example.yaml.

nameOverride: ""
fullnameOverride: ""

# Extra labels stamped on every object the chart renders.
commonLabels: {}

# Extra annotations stamped on every object the chart renders.
commonAnnotations: {}

# The controllers idle until an Integration (where findings come from, where
# the tracking issues go) and a Forge (how repositories are cloned and pushed)
# exist. Each entry below renders one CR in the release namespace — install
# this chart into the SAME namespace as the patchy release so the controllers
# see them. `spec` is rendered verbatim and validated CLIENT-side too:
# values.schema.json embeds the CRD spec schemas (generated by `mise run
# codegen`), so a typo'd or mistyped field fails the install instead of
# surfacing at the API server. The referenced Secrets are created out of band
# (see deploy/kustomize/base/secrets.example.yaml — keys: appID + privateKey,
# or token, plus webhookSecret for Integrations).
integrations: []
# - name: github
#   spec:
#       provider: github
#       secretRef:
#           name: patchy-github     # appID+privateKey (or token) + webhookSecret
#       interval: 10m               # credential revalidation
#       github:
#           # baseURL: https://ghes.example.com/api/v3   # GHES only
#           issues:
#               enabled: true       # tracking projection + human signals
#               approveComment: /approve
#           codeScanningAlerts:
#               enabled: true       # scanner ingestion + alert dismissal

forges: []
# - name: github
#   spec:
#       provider: github
#       # baseURL: https://ghes.example.com/api/v3       # GHES only
#       secretRef:
#           name: patchy-github     # appID+privateKey or token
#       # orgs: [acme]              # optional org allowlist
#       # repositories: ["^acme/payments-.*$"]           # optional regexes
#       interval: 10m
