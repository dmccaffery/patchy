apiVersion: v2
name: patchy-config
description: >-
    The patchy pipeline switch-on: the Integration and Forge custom resources, installed as a separate release AFTER
    the patchy chart so the CRDs exist before Helm validates the CRs against them.
type: application
# Only Kubernetes lines that have not reached end-of-life are supported.
kubeVersion: ">=1.34.0-0"
home: https://oss.bitwisemedia.uk/patchy
icon: https://oss.bitwisemedia.uk/patchy/assets/images/favicon.svg
sources:
    - https://github.com/bitwise-media-group/patchy
maintainers:
    - name: Bitwise Media Group
      url: https://github.com/bitwise-media-group

# Both stamped by release-please (extra-files generic updater, see
# release-please-config.json): the chart version tracks the app release 1:1,
# matching the patchy chart it configures.
version: 0.7.0 # x-release-please-version
appVersion: 0.7.0 # x-release-please-version
