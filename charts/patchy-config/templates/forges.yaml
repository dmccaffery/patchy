#
# The Forge custom resources rendered from the `forges` values array — one
# half of the pipeline switch-on (integrations.yaml is the other). A Forge
# says how repositories are cloned and pushed; the controllers idle until one
# exists. Each entry's `spec` is rendered verbatim — values.schema.json
# embeds the CRD spec schema, so it is validated client-side at install and
# again server-side by the CRD; the referenced Secrets are created out of
# band — see deploy/kustomize/base/secrets.example.yaml.
#
# These CRs live in their own chart because Helm validates every manifest
# against the API server before applying anything: a first install that
# carried both the CRDs and these CRs would fail validation before the CRDs
# exist. Install the patchy chart first, then this one, into the same
# namespace.
{{- range .Values.forges }}
---
apiVersion: patchy.bitwisemedia.uk/v1alpha1
kind: Forge
metadata:
    name: {{ required "forges[].name is required" .name }}
    namespace: {{ $.Release.Namespace }}
    labels:
        {{- include "patchy-config.labels" (dict "root" $ "name" "source-controller") | nindent 8 }}
    {{- with include "patchy-config.annotations" (dict "root" $) }}
    annotations:
        {{- . | nindent 8 }}
    {{- end }}
spec:
    {{- required (printf "forges[%s].spec is required" .name) .spec | toYaml | nindent 4 }}
{{- end }}
