# ---- repo-local tasks (the long tail the library intentionally omits) -------

# The e2e suite is a separate module: it boots an envtest kube-apiserver
# (the CRD state machine), builds the real controller binaries, and drives
# them with recorded webhook fixtures against an in-memory GitHub. No real
# cluster, no credentials, no network beyond the envtest asset download.
[e2e]
description = "run the end-to-end suite (envtest, real binaries, fake GitHub)"
dir = "{{cwd}}"
run = "./hack/e2e.sh"

# Deliver a recorded webhook fixture to a locally-running
# integration-controller, signed with its secret — the local stand-in for
# GitHub's webhook leg. -dev-secret signs with the dev overlay's placeholder
# webhook secret; -secret-file <file> supplies a real one. The task runs in
# e2e/, so relative fixture paths resolve from there.
# Example: mise run replay -- -dev-secret fixtures/webhooks/code_scanning_alert.created.json
[replay]
description = "sign and deliver a webhook fixture to a running controller"
dir = "{{cwd}}/e2e"
run = "go run ./replay"

# The e2e suite's in-memory GitHub API as a standalone dev server. The
# dev-fake overlay runs the same server in-cluster (nothing on the host
# needed); this task is for running it directly — poking at the API,
# developing the fake itself. See docs/deployment/colima.md.
[fakegithub]
description = "run the fake GitHub API standalone on the host"
dir = "{{cwd}}/e2e"
run = "go run ./fakegithub/cmd"

# Everything derived from api/v1alpha1: deepcopy methods (controller-gen
# object) and the CRD manifests for both kustomize and helm (hack/codegen.sh).
# CI treats a dirty tree after this task as drift and fails.
[codegen]
description = "regenerate deepcopy + CRD manifests from api/v1alpha1"
dir = "{{cwd}}"
run = "./hack/codegen.sh"

# Tests that need a real API server (CRD schema validation, controller
# integration): setup-envtest provisions kube-apiserver/etcd, then the suites
# that skip without KUBEBUILDER_ASSETS run for real.
[envtest]
description = "run envtest-backed tests (real kube-apiserver)"
dir = "{{cwd}}"
run = "./hack/envtest.sh"

# Status page SPA: built into internal/web/ui/dist and embedded into the
# status-server binary via -tags withui (hack/build.sh). dist/ is git-ignored
# (a built bundle); sources/outputs rerun npm only when the UI sources change.
[ui]
description = "build the embedded status page SPA (internal/web/ui/dist)"
dir = "{{cwd}}"
sources = [
  "internal/web/ui/package.json",
  "internal/web/ui/package-lock.json",
  "internal/web/ui/index.html",
  "internal/web/ui/vite.config.ts",
  "internal/web/ui/tsconfig.json",
  "internal/web/ui/src/**/*",
]
outputs = ["internal/web/ui/dist/index.html"]
run = [
  "npm --prefix internal/web/ui ci --no-fund --no-audit",
  "npm --prefix internal/web/ui run build",
]

# Redefines the archetype's build task (whole-task replacement): patchy is
# multi-binary — one controller per concern plus the agent runtime — so the
# single-app go-build is replaced by a loop over cmd/ (hack/build.sh; the
# multiline tasks live in hack/ so shellcheck lints them). The ui task runs
# first so the withui build can embed internal/web/ui/dist.
[build]
description = "build all patchy binaries into bin/"
dir = "{{cwd}}"
run = [{ task = "ui" }, "./hack/build.sh"]

# Canned status-page data for dev: apply the demo Findings/FindingRollups
# and seed their statuses (a subresource `kubectl apply -k` cannot write).
# The data is deliberately inert — every finding suspended, no trackingRef,
# no completedAt — see the manifest header.
[status-demo]
description = "seed canned findings/rollups for the status page (dev cluster)"
dir = "{{cwd}}"
run = "./hack/status-demo.sh"

# One-command local dev loop on Colima: cluster up, snapshot images, retag,
# apply the dev overlay, restart so a re-run redeploys. The interesting parts
# (traefik enablement, GITHUB_TOKEN secret, the ingress probe) are documented
# in the script and docs/deployment/colima.md.
[dev-colima]
description = "start colima, build snapshot images, deploy the dev overlay"
dir = "{{cwd}}"
run = "./hack/dev-colima.sh"

# The helm charts (charts/patchy = the stack, charts/patchy-config = the
# Integration/Forge CRs) render the same stack as deploy/kustomize and are
# published to oci://ghcr.io/bitwise-media-group/patchy/charts by
# .github/workflows/helm.yaml on release. This is the local gate: lint plus a
# render of every component combination the templates branch on.
[helm-lint]
description = "lint and render the helm charts"
dir = "{{cwd}}"
run = "./hack/helm-lint.sh"

# Redefined gates: the archetype's ci/pr plus the zensical docs build, so a
# broken site fails CI instead of surfacing at release time (the reusable
# release workflow's docs job publishes the site, keyed off zensical.toml).
[ci]
description = "the gates the reusable CI workflow runs"
run = [
  { task = "lint" },
  { task = "test" },
  { task = "build" },
  { task = "docs-build" },
]

[pr]
description = "full local gate before a pull request"
run = [
  { task = "tidy" },
  { task = "fmt" },
  { task = "lint" },
  { task = "test" },
  { task = "build" },
  { task = "docs-build" },
  { task = "commit" },
]
