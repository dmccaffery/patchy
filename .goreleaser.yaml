# GoReleaser config. Releases are cut by release-please: when its release PR merges,
# the reusable release workflow (.github/workflows/release.yaml) pushes the vX.Y.Z
# tag, leaves a draft GitHub release, and runs `goreleaser release` — which adopts
# that draft (use_existing_draft + mode: replace below). Build locally without
# publishing via `make snapshot`.
#
# Produces cross-platform binary archives + checksums + SBOMs + keyless cosign
# signatures. patchy ships Kubernetes services (no Homebrew cask); container
# images are built from deploy/docker as the deployment milestone lands.
version: 2

# ^ref: https://goreleaser.com/errors/multiple-tokens/
force_token: github

project_name: patchy

before:
    hooks:
        - go mod download

env:
    - CGO_ENABLED=0

builds:
    - id: source-controller
      main: ./cmd/source-controller
      binary: source-controller
      flags:
          - -trimpath
      ldflags:
          - -s -w
          - -X github.com/bitwise-media-group/patchy/internal/version.Version={{ .Version }}
          - -X github.com/bitwise-media-group/patchy/internal/version.Commit={{ .ShortCommit }}
          - -X github.com/bitwise-media-group/patchy/internal/version.BuildDate={{ .Date }}
      goos:
          - linux
          - darwin
      goarch:
          - amd64
          - arm64
    - id: context-controller
      main: ./cmd/context-controller
      binary: context-controller
      flags:
          - -trimpath
      ldflags:
          - -s -w
          - -X github.com/bitwise-media-group/patchy/internal/version.Version={{ .Version }}
          - -X github.com/bitwise-media-group/patchy/internal/version.Commit={{ .ShortCommit }}
          - -X github.com/bitwise-media-group/patchy/internal/version.BuildDate={{ .Date }}
      goos:
          - linux
          - darwin
      goarch:
          - amd64
          - arm64
    - id: remediation-controller
      main: ./cmd/remediation-controller
      binary: remediation-controller
      flags:
          - -trimpath
      ldflags:
          - -s -w
          - -X github.com/bitwise-media-group/patchy/internal/version.Version={{ .Version }}
          - -X github.com/bitwise-media-group/patchy/internal/version.Commit={{ .ShortCommit }}
          - -X github.com/bitwise-media-group/patchy/internal/version.BuildDate={{ .Date }}
      goos:
          - linux
          - darwin
      goarch:
          - amd64
          - arm64
    - id: agent-runner
      main: ./cmd/agent-runner
      binary: agent-runner
      flags:
          - -trimpath
      ldflags:
          - -s -w
          - -X github.com/bitwise-media-group/patchy/internal/version.Version={{ .Version }}
          - -X github.com/bitwise-media-group/patchy/internal/version.Commit={{ .ShortCommit }}
          - -X github.com/bitwise-media-group/patchy/internal/version.BuildDate={{ .Date }}
      goos:
          - linux
          - darwin
      goarch:
          - amd64
          - arm64

archives:
    - id: patchy
      formats: [tar.gz]
      name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
      files:
          - LICENSE

checksum:
    name_template: checksums.txt

# ^ref: https://goreleaser.com/customization/sign/sign/
# Keyless cosign signatures over each built binary; the reusable release workflow
# supplies the GitHub Actions OIDC token. `make snapshot` skips this (--skip=sign).
binary_signs:
    - cmd: cosign
      signature: "{{ .Binary }}_{{ .Os }}_{{ .Arch }}.sigstore.json"
      args:
          - sign-blob
          - --bundle=${signature}
          - ${artifact}
          - --yes
      output: true

sboms:
    - artifacts: archive
      # syft is pinned by the toolchain submodule's mise config and on PATH for
      # whoever runs goreleaser (make snapshot locally, the release workflow in CI).
      cmd: syft
      args:
          - $artifact
          - --output
          - spdx-json=$document

snapshot:
    version_template: "{{ incpatch .Version }}-snapshot-{{ .ShortCommit }}"

changelog:
    sort: asc
    use: github
    format: "{{ .SHA }}: {{ .Message }}{{ if and (not .IsNightly) .Logins }} ({{ .Logins | englishJoin }}){{ end }}"
    filters:
        exclude:
            - "^test"
            - "^chore"
            - "^build"
    groups:
        - title: "New Features"
          regexp: '^.*?feat(\(.+\))??!?:.+$'
          order: 100
        - title: "Security Updates"
          regexp: '^.*?sec(\(.+\))??!?:.+$'
          order: 150
        - title: "Bug Fixes"
          regexp: '^.*?(fix|refactor)(\(.+\))??!?:.+$'
          order: 200
        - title: "Documentation Updates"
          regexp: ^.*?docs?(\(.+\))??!?:.+$
          order: 400
        - title: Other Work
          order: 9999

release:
    github:
        owner: bitwise-media-group
        name: patchy
    # The release-please job in release.yaml leaves a draft release named after
    # the tag it pushes. Adopt that draft instead of creating a second release,
    # swap its release-please notes for the grouped changelog above, and
    # undraft it only once every asset has been uploaded.
    use_existing_draft: true
    mode: replace
