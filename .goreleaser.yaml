# GoReleaser config. Releases are cut by release-please: when its release PR merges,
# the reusable release workflow (.github/workflows/release.yaml) pushes the vX.Y.Z
# tag, leaves a draft GitHub release, and runs `goreleaser release` — which adopts
# that draft (use_existing_draft + mode: replace below). Build locally without
# publishing via `make snapshot`.
#
# Produces cross-platform binary archives + checksums + SBOMs + keyless cosign
# signatures, and the container images: multi-arch manifests built by buildx
# from the repo-root Dockerfile.* (dockers_v2 below) and pushed to ghcr on
# release.
version: 2

# ^ref: https://goreleaser.com/errors/multiple-tokens/
force_token: github

project_name: patchy

before:
    hooks:
        - go mod download

env:
    - CGO_ENABLED=0

builds:
    - id: source-controller
      main: ./cmd/source-controller
      binary: source-controller
      flags:
          - -trimpath
      ldflags:
          - -s -w
          - -X github.com/bitwise-media-group/patchy/internal/version.Version={{ .Version }}
          - -X github.com/bitwise-media-group/patchy/internal/version.Commit={{ .ShortCommit }}
          - -X github.com/bitwise-media-group/patchy/internal/version.BuildDate={{ .Date }}
      goos:
          - linux
          - darwin
      goarch:
          - amd64
          - arm64
    - id: context-controller
      main: ./cmd/context-controller
      binary: context-controller
      flags:
          - -trimpath
      ldflags:
          - -s -w
          - -X github.com/bitwise-media-group/patchy/internal/version.Version={{ .Version }}
          - -X github.com/bitwise-media-group/patchy/internal/version.Commit={{ .ShortCommit }}
          - -X github.com/bitwise-media-group/patchy/internal/version.BuildDate={{ .Date }}
      goos:
          - linux
          - darwin
      goarch:
          - amd64
          - arm64
    - id: remediation-controller
      main: ./cmd/remediation-controller
      binary: remediation-controller
      flags:
          - -trimpath
      ldflags:
          - -s -w
          - -X github.com/bitwise-media-group/patchy/internal/version.Version={{ .Version }}
          - -X github.com/bitwise-media-group/patchy/internal/version.Commit={{ .ShortCommit }}
          - -X github.com/bitwise-media-group/patchy/internal/version.BuildDate={{ .Date }}
      goos:
          - linux
          - darwin
      goarch:
          - amd64
          - arm64
    - id: webhook-controller
      main: ./cmd/webhook-controller
      binary: webhook-controller
      flags:
          - -trimpath
      ldflags:
          - -s -w
          - -X github.com/bitwise-media-group/patchy/internal/version.Version={{ .Version }}
          - -X github.com/bitwise-media-group/patchy/internal/version.Commit={{ .ShortCommit }}
          - -X github.com/bitwise-media-group/patchy/internal/version.BuildDate={{ .Date }}
      goos:
          - linux
          - darwin
      goarch:
          - amd64
          - arm64
    - id: agent-runner
      main: ./cmd/agent-runner
      binary: agent-runner
      flags:
          - -trimpath
      ldflags:
          - -s -w
          - -X github.com/bitwise-media-group/patchy/internal/version.Version={{ .Version }}
          - -X github.com/bitwise-media-group/patchy/internal/version.Commit={{ .ShortCommit }}
          - -X github.com/bitwise-media-group/patchy/internal/version.BuildDate={{ .Date }}
      goos:
          - linux
          - darwin
      goarch:
          - amd64
          - arm64

archives:
    - id: patchy
      formats: [tar.gz]
      name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
      files:
          - LICENSE

checksum:
    name_template: checksums.txt

# ^ref: https://goreleaser.com/customization/package/dockers_v2/
# Container images — one per binary, each a linux/amd64 + linux/arm64 manifest.
# buildx assembles them from the binaries built above: nothing is compiled
# inside Docker; the Dockerfiles only COPY $TARGETPLATFORM/<binary> out of the
# generated build context. Image names match deploy/kustomize. `goreleaser
# release` pushes (the release workflow logs in to ghcr and sets up
# buildx/QEMU); `make snapshot` builds per-arch local images without pushing —
# it needs a running docker with buildx.
dockers_v2:
    - id: source-controller
      ids: [source-controller]
      dockerfile: Dockerfile.controller
      images:
          - ghcr.io/bitwise-media-group/patchy/source-controller
      tags:
          - v{{ .Version }}
          - latest
      platforms:
          - linux/amd64
          - linux/arm64
      build_args:
          TARGET: source-controller
      labels:
          # the source label is what links the ghcr package to this repository
          org.opencontainers.image.source: https://github.com/bitwise-media-group/patchy
          org.opencontainers.image.licenses: MIT
          org.opencontainers.image.revision: "{{ .FullCommit }}"
          org.opencontainers.image.version: "{{ .Version }}"
    - id: context-controller
      ids: [context-controller]
      dockerfile: Dockerfile.controller
      images:
          - ghcr.io/bitwise-media-group/patchy/context-controller
      tags:
          - v{{ .Version }}
          - latest
      platforms:
          - linux/amd64
          - linux/arm64
      build_args:
          TARGET: context-controller
      labels:
          org.opencontainers.image.source: https://github.com/bitwise-media-group/patchy
          org.opencontainers.image.licenses: MIT
          org.opencontainers.image.revision: "{{ .FullCommit }}"
          org.opencontainers.image.version: "{{ .Version }}"
    - id: remediation-controller
      ids: [remediation-controller]
      dockerfile: Dockerfile.controller
      images:
          - ghcr.io/bitwise-media-group/patchy/remediation-controller
      tags:
          - v{{ .Version }}
          - latest
      platforms:
          - linux/amd64
          - linux/arm64
      build_args:
          TARGET: remediation-controller
      labels:
          org.opencontainers.image.source: https://github.com/bitwise-media-group/patchy
          org.opencontainers.image.licenses: MIT
          org.opencontainers.image.revision: "{{ .FullCommit }}"
          org.opencontainers.image.version: "{{ .Version }}"
    - id: webhook-controller
      ids: [webhook-controller]
      dockerfile: Dockerfile.controller
      images:
          - ghcr.io/bitwise-media-group/patchy/webhook-controller
      tags:
          - v{{ .Version }}
          - latest
      platforms:
          - linux/amd64
          - linux/arm64
      build_args:
          TARGET: webhook-controller
      labels:
          org.opencontainers.image.source: https://github.com/bitwise-media-group/patchy
          org.opencontainers.image.licenses: MIT
          org.opencontainers.image.revision: "{{ .FullCommit }}"
          org.opencontainers.image.version: "{{ .Version }}"
    - id: agent-runner
      ids: [agent-runner]
      dockerfile: Dockerfile.agent-runner
      images:
          - ghcr.io/bitwise-media-group/patchy/agent-runner
      tags:
          - v{{ .Version }}
          - latest
      platforms:
          - linux/amd64
          - linux/arm64
      labels:
          org.opencontainers.image.source: https://github.com/bitwise-media-group/patchy
          org.opencontainers.image.licenses: MIT
          org.opencontainers.image.revision: "{{ .FullCommit }}"
          org.opencontainers.image.version: "{{ .Version }}"

# ^ref: https://goreleaser.com/customization/package/docker_digests/
# Writes dist/digests.txt — one `<hex digest>  <image:tag>` line per published
# image/manifest, sha256sum format — which the release workflow feeds to
# actions/attest so the images get the same GitHub build-provenance
# attestation as every file in checksums.txt. Verify with:
#   gh attestation verify --owner bitwise-media-group \
#     oci://ghcr.io/bitwise-media-group/patchy/<name>:vX.Y.Z
docker_digest:
    name_template: digests.txt

# ^ref: https://goreleaser.com/customization/sign/docker/
# Keyless cosign signatures over the pushed container images. The empty
# `artifacts` default selects exactly the dockers_v2 image artifacts above, and
# signing targets the immutable digest, not the tag. Signatures are pushed to
# ghcr as OCI artifacts next to each image. --use-signing-config=false pins
# cosign v3 to the legacy signature format (.sig tag + Rekor upload) instead of
# a bundle attached via the OCI referrers API: kyverno's Cosign verification
# (flux-manifests verify-platform-signature) only reads the legacy format.
# Runs only on publish; `make snapshot` additionally skips it via --skip=sign.
# Verify with:
#   cosign verify ghcr.io/bitwise-media-group/patchy/<name>:vX.Y.Z \
#     --certificate-oidc-issuer=https://token.actions.githubusercontent.com \
#     --certificate-identity-regexp='^https://github.com/bitwise-media-group/github-workflows/'
docker_signs:
    - cmd: cosign
      args:
          - sign
          - ${artifact}@${digest}
          - --yes
          - --use-signing-config=false
      output: true

# ^ref: https://goreleaser.com/customization/sign/sign/
# Keyless cosign signatures over each built binary; the reusable release workflow
# supplies the GitHub Actions OIDC token. `make snapshot` skips this (--skip=sign).
binary_signs:
    - cmd: cosign
      signature: "{{ .Binary }}_{{ .Os }}_{{ .Arch }}.sigstore.json"
      args:
          - sign-blob
          - --bundle=${signature}
          - ${artifact}
          - --yes
      output: true

sboms:
    - artifacts: archive
      # syft is pinned by the toolchain submodule's mise config and on PATH for
      # whoever runs goreleaser (make snapshot locally, the release workflow in CI).
      cmd: syft
      args:
          - $artifact
          - --output
          - spdx-json=$document

snapshot:
    version_template: "{{ incpatch .Version }}-snapshot-{{ .ShortCommit }}"

changelog:
    sort: asc
    use: github
    format: "{{ .SHA }}: {{ .Message }}{{ if and (not .IsNightly) .Logins }} ({{ .Logins | englishJoin }}){{ end }}"
    filters:
        exclude:
            - "^test"
            - "^chore"
            - "^build"
    groups:
        - title: "New Features"
          regexp: '^.*?feat(\(.+\))??!?:.+$'
          order: 100
        - title: "Security Updates"
          regexp: '^.*?sec(\(.+\))??!?:.+$'
          order: 150
        - title: "Bug Fixes"
          regexp: '^.*?(fix|refactor)(\(.+\))??!?:.+$'
          order: 200
        - title: "Documentation Updates"
          regexp: ^.*?docs?(\(.+\))??!?:.+$
          order: 400
        - title: Other Work
          order: 9999

release:
    github:
        owner: bitwise-media-group
        name: patchy
    # The release-please job in release.yaml leaves a draft release named after
    # the tag it pushes. Adopt that draft instead of creating a second release,
    # swap its release-please notes for the grouped changelog above, and
    # undraft it only once every asset has been uploaded.
    use_existing_draft: true
    mode: replace
