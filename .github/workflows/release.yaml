# Release pipeline — thin caller for the org's reusable release workflow.
# release-please watches main and keeps a release PR current from the Conventional
# Commit history; when that PR merges the workflow cuts the draft GitHub release +
# vX.Y.Z tag and GoReleaser adopts it — binary archives + checksums + SBOMs +
# keyless cosign signatures, and a SLSA build-provenance attestation over
# everything in checksums.txt. patchy ships Kubernetes services, not a Homebrew
# CLI, so there is no cask; container images are published by goreleaser from
# deploy/docker (added as the deployment milestone lands).
#
# app-client-id/app-private-key author the release-please PR as the "FF Merge" App
# instead of the GITHUB_TOKEN. A GITHUB_TOKEN-authored push fires no workflow_run,
# so a release PR opened that way never triggers the auto-merge in merge.yaml;
# authoring it as the App makes the release PR auto-merge once approved and green,
# like any other.
#
# The reusable workflow is pinned to a full commit SHA (tag in the comment) so a
# moved tag can never change what runs; Dependabot keeps the pin fresh.
name: Release

on:
    push:
        branches: [main]
    # allow cutting a release manually from the Actions tab
    workflow_dispatch:

permissions: {}

jobs:
    release:
        uses: bitwise-media-group/github-workflows/.github/workflows/release.yaml@ee856f73ecea9b0c2c989d3a6aa585774b0d2a38 # v5.0.0
        # ceiling for the reusable workflow's release-please + goreleaser jobs.
        # GitHub resolves a reusable workflow's permissions as the union of every job
        # and ignores `if:`, so the caller must grant the goreleaser job's id-token /
        # attestations / artifact-metadata even on a release that skips them.
        permissions:
            # create the release/tag and upload assets
            contents: write
            # release-please creates pr labels via the issues api
            issues: write
            # release-please opens the release pull request
            pull-requests: write
            # cosign keyless signing (goreleaser)
            id-token: write
            # github build-provenance attestation
            attestations: write
            # artifact storage record for the attestation
            artifact-metadata: write
            # granted for parity with the reusable workflow's docs job ceiling
            pages: write
        with:
            # author the release PR as the FF Merge App so it can auto-merge (a
            # GITHUB_TOKEN-authored push fires no workflow_run to trigger the merge)
            app-client-id: ${{ vars.FF_MERGE_CLIENT_ID }}
        secrets:
            # private key for the App that authors the release PR (same App as /merge)
            app-private-key: ${{ secrets.FF_MERGE_PRIVATE_KEY }}
