# Security analysis — thin caller for the org's reusable security workflow. It runs
# CodeQL over the repository's GitHub Actions workflows (build-free) and the Go
# module (autobuild; setup-go matches go.mod), on every push and pull request plus a
# weekly scheduled run so newly published queries reach already-merged code.
#
# languages is pinned to "actions,go": there is no product JavaScript to scan
# (the prose linters come from the toolchain submodule's mise pins, with no
# package.json in this repo).
#
# The reusable workflow is pinned to a full commit SHA (tag in the comment) so a
# moved tag can never change what runs; Dependabot keeps the pin fresh.
name: Security Analysis

on:
    push:
        branches: [main]
    pull_request:
    schedule:
        - cron: "41 19 * * 4"

# ceiling for the reusable workflow's analyze job
permissions:
    # upload analysis results to code scanning
    security-events: write
    # fetch internal or private CodeQL packs
    packages: read
    # only required for workflows in private repositories
    actions: read
    # check out the repository
    contents: read

jobs:
    analyze:
        uses: bitwise-media-group/github-workflows/.github/workflows/security.yaml@b9c031429f149794bedb5411b08d5a787b8d9959 # v6.0.1
        with:
            languages: actions,go
