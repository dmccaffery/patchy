# Continuous integration — thin caller for the org's reusable ci workflow (v5+:
# mise-task aware). It discovers the canonical tasks this repo defines and runs
# `make lint` / `build` / `test` as one parallel job each, then Codecov uploads
# from coverage/ — emitted by `make test`. `make lint` carries all check-mode
# static analysis — golangci-lint, govulncheck, addlicense, markdownlint,
# prettier --check — with the pinned tools coming from the toolchain submodule
# at .mise/ (no package.json or .node-version: mise provisions its own Node for
# the prose linters). The Go version for the product build comes from go.mod.
#
# The reusable workflow is pinned to a full commit SHA (tag in the comment) so a
# moved tag can never change what runs; Dependabot keeps the pin fresh.
name: Continuous Integration

on:
    push:
        branches: [main]
    pull_request:

# the reusable workflow's jobs only need contents:read; grant just that ceiling
permissions:
    contents: read

jobs:
    ci:
        # The default cache-dependency-path (go.sum) is the only lockfile that
        # affects the build: the dev CLIs (golangci-lint, govulncheck, addlicense,
        # gotestsum, ...) are pinned by the toolchain submodule's
        # config.toml/mise.lock, not a tools/go.sum.
        uses: bitwise-media-group/github-workflows/.github/workflows/ci.yaml@b9c031429f149794bedb5411b08d5a787b8d9959 # v6.0.1
