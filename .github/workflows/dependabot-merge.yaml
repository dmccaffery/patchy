# Dependabot auto-merge — thin caller for the org's reusable dependabot-merge
# workflow. Dependabot opens a PR (see .github/dependabot.yaml); minor/patch
# updates are auto-approved and fast-forwarded once CI is green, preserving
# Dependabot's signed commits with the same ff-merge action that backs the
# `/merge` flow. Major updates are never approved, so they wait for a human.
#
# Just workflow_run: the reusable workflow approves and fast-forwards once CI is
# green, reading the minor/patch-vs-major policy from Dependabot's signed commit.
# This event does NOT attach a check run to the PR, so it needs no
# pull_request_target and leaves no skipped-job clutter. check_suite is NOT usable —
# GitHub does not fire it for a repo's own Actions CI. The workflow_run list names
# every workflow that must pass — "Continuous Integration" (ci.yaml) and "Security
# Analysis" (security.yaml); whichever finishes last triggers the merge attempt.
#
# Org prerequisites (see bitwise-media-group/ff-merge): the FF_MERGE_CLIENT_ID
# variable + FF_MERGE_PRIVATE_KEY secret, and the "FF Merge" App installed on this
# repo and in main's ruleset bypass list — the same App as the /merge flow.
#
# The reusable workflow is pinned to a full commit SHA (tag in the comment);
# Dependabot keeps the pin fresh.
name: Dependabot Auto-Merge

on:
    workflow_run:
        workflows: ["Continuous Integration", "Security Analysis"]
        types: [completed]

# the App token does the privileged work; the caller grants nothing
permissions: {}

jobs:
    auto-merge:
        uses: bitwise-media-group/github-workflows/.github/workflows/dependabot-merge.yaml@b9c031429f149794bedb5411b08d5a787b8d9959 # v6.0.1
        with:
            app-client-id: ${{ vars.FF_MERGE_CLIENT_ID }}
        secrets:
            app-private-key: ${{ secrets.FF_MERGE_PRIVATE_KEY }}
