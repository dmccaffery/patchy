# Merge review ack — thin caller for the org's reusable merge-review-ack workflow.
# It closes the fork-PR auto-merge gap: an approval on a fork PR carries no secrets,
# so merge.yaml's review path can't merge it directly, and if CI was already green
# the approval is the last event — nothing else fires to finish the merge. This
# workflow completes on an approving review purely so its workflow_run(completed)
# re-enters merge.yaml in the base-repo context, where the App token is minted and
# the fast-forward retried. Harmless for same-repo PRs (those merge via the review
# path directly).
#
# Wire-up: "Merge Review Ack" (this workflow's name) is listed in merge.yaml's
# workflow_run.workflows. No secret needed — it does no privileged work; the
# completed run is the only signal.
#
# The reusable workflow is pinned to a full commit SHA (tag in the comment);
# Dependabot keeps the pin fresh.
name: Merge Review Ack

on:
    pull_request_review:
        types: [submitted]

# does no privileged work; grants nothing
permissions: {}

jobs:
    ack:
        uses: bitwise-media-group/github-workflows/.github/workflows/merge-review-ack.yaml@b9c031429f149794bedb5411b08d5a787b8d9959 # v6.0.1
