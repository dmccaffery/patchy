# Keep the app module deps, the shared toolchain submodule, and SHA-pinned
# actions fresh.
version: 2
updates:
    - package-ecosystem: gomod
      directory: /
      cooldown:
          default-days: 7
      commit-message:
          include: scope
          prefix: deps
          prefix-development: deps
      schedule:
          interval: daily

    # The pinned dev CLIs (addlicense, golangci-lint, goreleaser, ...) and the
    # task archetypes come from the toolchain submodule at .mise/. Track it so a
    # library release (a new `release` branch head) flows here as a bump.
    - package-ecosystem: gitsubmodule
      directory: /
      cooldown:
          default-days: 7
          # our own toolchain submodule ships straight through — no cooldown wait.
          # Dependabot names a submodule dependency by its path, so exclude ".mise"
          # (not an owner glob like the actions ecosystem uses).
          exclude:
              - .mise
      commit-message:
          include: scope
          prefix: build
          prefix-development: build
      schedule:
          interval: daily

    - package-ecosystem: github-actions
      directory: /
      schedule:
          interval: daily
      commit-message:
          prefix: build
          prefix-development: build
          include: scope
      cooldown:
          default-days: 7
          # our own actions ship straight through — no cooldown wait
          exclude:
              - bitwise-media-group/*
      groups:
          actions:
              patterns:
                  - actions/*
          github:
              patterns:
                  - github/*
          bitwise-media-group:
              patterns:
                  - bitwise-media-group/*
