#
# One Deployment per controller, rendered from a single spec because they
# differ only in image, resources, config, and whether the service-account
# token is mounted (only the remediation-controller talks to the Kubernetes
# API — it creates the agent Jobs and reads their pod logs).
#
# All three are singletons with strategy Recreate, ON PURPOSE. The state
# machine is GitHub issue labels and there is no leader election in the
# binaries — two replicas would both act on the same issue (double comments,
# duplicate accumulation issues, duplicate agent Jobs). Do not scale these.
{{- range $c := list
    (dict "name" "source-controller" "vals" .Values.sourceController "automount" false)
    (dict "name" "context-controller" "vals" .Values.contextController "automount" false)
    (dict "name" "remediation-controller" "vals" .Values.remediationController "automount" true)
}}
---
apiVersion: apps/v1
kind: Deployment
metadata:
    name: {{ include "patchy.fullname" $ }}-{{ $c.name }}
    namespace: {{ $.Release.Namespace }}
    labels:
        {{- include "patchy.labels" (dict "root" $ "name" $c.name "component" "controller") | nindent 8 }}
    {{- with include "patchy.annotations" (dict "root" $) }}
    annotations:
        {{- . | nindent 8 }}
    {{- end }}
spec:
    replicas: 1
    strategy:
        type: Recreate
    selector:
        matchLabels:
            {{- include "patchy.selectorLabels" (dict "root" $ "name" $c.name) | nindent 12 }}
    template:
        metadata:
            labels:
                {{- include "patchy.labels" (dict "root" $ "name" $c.name "component" "controller") | nindent 16 }}
                {{- with $c.vals.podLabels }}
                {{- toYaml . | nindent 16 }}
                {{- end }}
            {{- with include "patchy.annotations" (dict "root" $ "extra" $c.vals.podAnnotations) }}
            annotations:
                {{- . | nindent 16 }}
            {{- end }}
        spec:
            serviceAccountName: {{ include "patchy.serviceAccountName" (dict "root" $ "name" $c.name "vals" $c.vals) }}
            {{- if not $c.automount }}
            automountServiceAccountToken: false
            {{- end }}
            {{- with $.Values.image.pullSecrets }}
            imagePullSecrets:
                {{- toYaml . | nindent 16 }}
            {{- end }}
            securityContext:
                runAsNonRoot: true
                runAsUser: 65532
                runAsGroup: 65532
                fsGroup: 65532
                seccompProfile:
                    type: RuntimeDefault
            containers:
                - name: controller
                  image: {{ include "patchy.image" (dict "root" $ "binary" $c.name "image" $c.vals.image) }}
                  imagePullPolicy: {{ $.Values.image.pullPolicy }}
                  args: ["serve"]
                  envFrom:
                      - configMapRef:
                            name: {{ include "patchy.configMapName" (dict "root" $ "name" $c.name) }}
                  env:
                      - name: PATCHY_GITHUB_APP_ID
                        valueFrom:
                            secretKeyRef:
                                name: {{ $.Values.github.appSecret }}
                                key: app-id
                  ports:
                      - name: http
                        containerPort: 8080
                        protocol: TCP
                  livenessProbe:
                      httpGet:
                          path: /healthz
                          port: http
                      initialDelaySeconds: 5
                      periodSeconds: 20
                  readinessProbe:
                      httpGet:
                          path: /readyz
                          port: http
                      initialDelaySeconds: 2
                      periodSeconds: 10
                  {{- with $c.vals.resources }}
                  resources:
                      {{- toYaml . | nindent 22 }}
                  {{- end }}
                  securityContext:
                      allowPrivilegeEscalation: false
                      readOnlyRootFilesystem: true
                      capabilities:
                          drop: ["ALL"]
                      seccompProfile:
                          type: RuntimeDefault
                  volumeMounts:
                      - name: webhook-secret
                        mountPath: /etc/patchy/webhook
                        readOnly: true
                      - name: github-app
                        mountPath: /etc/patchy/github-app
                        readOnly: true
                      - name: tmp
                        mountPath: /tmp
            {{- with $c.vals.nodeSelector }}
            nodeSelector:
                {{- toYaml . | nindent 16 }}
            {{- end }}
            {{- with $c.vals.tolerations }}
            tolerations:
                {{- toYaml . | nindent 16 }}
            {{- end }}
            {{- with $c.vals.affinity }}
            affinity:
                {{- toYaml . | nindent 16 }}
            {{- end }}
            volumes:
                - name: webhook-secret
                  secret:
                      secretName: {{ $.Values.github.webhookSecret }}
                - name: github-app
                  secret:
                      secretName: {{ $.Values.github.appSecret }}
                      defaultMode: 0400
                # The root filesystem is read-only; every binary wants a
                # writable /tmp. The remediation-controller additionally
                # clones the target repository into it (internal/gitpush), so
                # that one is sized — see remediationController.tmpSizeLimit.
                - name: tmp
                  emptyDir:
                      {{- if $c.vals.tmpSizeLimit }}
                      sizeLimit: {{ $c.vals.tmpSizeLimit }}
                      {{- else }}
                      {}
                      {{- end }}
{{- end }}
