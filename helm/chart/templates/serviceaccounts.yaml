#
# One ServiceAccount per controller (<controller>.serviceAccount). Whether the
# token is mounted is NOT a knob — it is the isolation model: only the
# remediation-controller talks to the Kubernetes API (it creates the agent
# Jobs and reads their pod logs; see rbac.yaml), so only its token exists.
{{- range $c := list
    (dict "name" "source-controller" "vals" .Values.sourceController "automount" false)
    (dict "name" "context-controller" "vals" .Values.contextController "automount" false)
    (dict "name" "remediation-controller" "vals" .Values.remediationController "automount" true)
}}
{{- if $c.vals.serviceAccount.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
    name: {{ include "patchy.serviceAccountName" (dict "root" $ "name" $c.name "vals" $c.vals) }}
    namespace: {{ $.Release.Namespace }}
    labels:
        {{- include "patchy.labels" (dict "root" $ "name" $c.name) | nindent 8 }}
    {{- with include "patchy.annotations" (dict "root" $ "extra" $c.vals.serviceAccount.annotations) }}
    annotations:
        {{- . | nindent 8 }}
    {{- end }}
{{- if not $c.automount }}
automountServiceAccountToken: false
{{- end }}
{{- end }}
{{- end }}
---
# The identity the agent Job pods run as (PATCHY_AGENT_SERVICE_ACCOUNT). The
# agent needs NO Kubernetes API access whatsoever, so no Role is bound to it
# and its token is not mounted.
apiVersion: v1
kind: ServiceAccount
metadata:
    name: {{ .Values.agent.serviceAccount }}
    namespace: {{ .Values.agent.namespace }}
    labels:
        {{- include "patchy.labels" (dict "root" . "name" "patchy-agent") | nindent 8 }}
    {{- with include "patchy.annotations" (dict "root" .) }}
    annotations:
        {{- . | nindent 8 }}
    {{- end }}
automountServiceAccountToken: false
