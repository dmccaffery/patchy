{{- if .Values.crds.install }}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    {{- if .Values.crds.keep }}
    helm.sh/resource-policy: keep
    {{- end }}
    controller-gen.kubebuilder.io/version: v0.21.0
  name: forges.patchy.bitwisemedia.uk
spec:
  group: patchy.bitwisemedia.uk
  names:
    categories:
    - patchy
    kind: Forge
    listKind: ForgeList
    plural: forges
    singular: forge
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.provider
      name: Provider
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Forge holds repository credentials: source-controller resolves a Finding's
          repository to a Forge for read-only clone tokens; remediation-controller
          resolves the same Forge for scoped write tokens (branch push, pull
          request). Both go through the shared internal/forge package.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              ForgeSpec configures repository credentials for one forge, scoped by
              optional org and repository filters. Matching (in internal/forge): the
              repository URL's host must equal the forge host, then the org allowlist,
              then the repository regexes; when several Forges match, the more
              constrained spec wins (orgs set beats unset, then repositories set beats
              unset) and a remaining tie is a configuration error surfaced on the
              Finding.
            properties:
              baseURL:
                description: |-
                  BaseURL is the forge host; empty means the provider's public host
                  (github.com).
                type: string
              interval:
                default: 10m
                description: Interval between credential revalidations.
                type: string
              orgs:
                description: Orgs restricts this forge to the listed organizations;
                  empty means all.
                items:
                  type: string
                type: array
              provider:
                description: Provider is the forge family.
                enum:
                - github
                type: string
              repositories:
                description: |-
                  Repositories restricts this forge to repositories whose "owner/name"
                  matches any of the listed RE2 regular expressions; empty means all.
                items:
                  type: string
                type: array
              secretRef:
                description: |-
                  SecretRef names the credential Secret: key "token" (PAT, dev) or keys
                  "appID" + "privateKey" (GitHub App).
                properties:
                  name:
                    description: Name of the Secret.
                    minLength: 1
                    type: string
                required:
                - name
                type: object
              suspend:
                description: Suspend pauses reconciliation of this forge.
                type: boolean
            required:
            - provider
            - secretRef
            type: object
          status:
            description: ForgeStatus is the forge's observed state.
            properties:
              conditions:
                description: 'Conditions of the forge (Ready: credential valid).'
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              installations:
                description: Installations summarizes the App installations (github
                  App auth only).
                items:
                  description: |-
                    InstallationSummary counts one GitHub App installation — counts and
                    accounts only, never a repository list (the estate is ~15K repositories).
                  properties:
                    account:
                      description: Account the App is installed on.
                      type: string
                    id:
                      description: ID of the installation.
                      format: int64
                      type: integer
                    repositories:
                      description: Repositories the installation covers.
                      format: int32
                      type: integer
                  required:
                  - account
                  - id
                  type: object
                type: array
              observedGeneration:
                description: ObservedGeneration is the last spec generation acted
                  on.
                format: int64
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
{{- end }}
