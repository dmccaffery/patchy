#
# Optional Gateway API HTTPRoute per controller (<controller>.httpRoute), the
# Gateway-flavoured alternative to ingress.yaml. The rule is fixed to /webhook
# on purpose: that is the only endpoint GitHub needs, and the probes stay
# cluster-internal. Requires the Gateway API CRDs.
{{- range $c := list
    (dict "name" "source-controller" "vals" .Values.sourceController)
    (dict "name" "context-controller" "vals" .Values.contextController)
    (dict "name" "remediation-controller" "vals" .Values.remediationController)
}}
{{- $route := $c.vals.httpRoute }}
{{- if $route.enabled }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
    name: {{ include "patchy.fullname" $ }}-{{ $c.name }}
    namespace: {{ $.Release.Namespace }}
    labels:
        {{- include "patchy.labels" (dict "root" $ "name" $c.name) | nindent 8 }}
    {{- with include "patchy.annotations" (dict "root" $ "extra" $route.annotations) }}
    annotations:
        {{- . | nindent 8 }}
    {{- end }}
spec:
    {{- with $route.parentRefs }}
    parentRefs:
        {{- toYaml . | nindent 8 }}
    {{- end }}
    {{- with $route.hostnames }}
    hostnames:
        {{- toYaml . | nindent 8 }}
    {{- end }}
    rules:
        - matches:
              - path:
                    type: PathPrefix
                    value: /webhook
          backendRefs:
              - name: {{ include "patchy.fullname" $ }}-{{ $c.name }}
                port: {{ $c.vals.service.port }}
{{- end }}
{{- end }}
