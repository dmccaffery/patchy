#
# The webhook-controller: ConfigMap, ServiceAccount, Deployment, Service, and
# NetworkPolicy in one file because the component deliberately does NOT share
# the controllers' spec. The differences are the point:
#
#   - No GitHub App secret is mounted and no PATCHY_GITHUB_APP_ID is set —
#     the only internet-facing pod holds nothing that can mint a token; the
#     shared webhook HMAC secret is its only credential.
#   - It is stateless, so it scales (webhookController.replicas, default 2) where
#     the controllers are hardcoded singletons.
#   - Its egress is the controllers' 8080 (plus DNS and TLS for OTLP), not
#     the GitHub API.
#
# Each delivery is routed to the controllers that consume its X-GitHub-Event
# type (the routing table below); unclaimed event types go to the
# source-controller, which owns the pkg/source plugin seam.
{{- $vals := .Values.webhookController }}
{{- $g := .Values.config }}
{{/*
The event -> controller routing table. This mirrors what each binary consumes
(internal/sourcectrl via pkg/source, contextctrl, remedctrl); the "*" default
sends event types no rule claims — e.g. those registered by out-of-tree
pkg/source plugins — to the source-controller, which owns that plugin seam.
Override wholesale via webhookController.config.extra.PATCHY_FORWARD_ROUTES.
*/}}
{{- $src := printf "http://%s-source-controller:%d/webhook" (include "patchy.fullname" .) (int .Values.sourceController.service.port) }}
{{- $ctx := printf "http://%s-context-controller:%d/webhook" (include "patchy.fullname" .) (int .Values.contextController.service.port) }}
{{- $rem := printf "http://%s-remediation-controller:%d/webhook" (include "patchy.fullname" .) (int .Values.remediationController.service.port) }}
{{- $routes := join "," (list
    (printf "code_scanning_alert=%s" $src)
    (printf "issues=%s" $ctx)
    (printf "issue_comment=%s" $rem)
    (printf "pull_request=%s" $rem)
    (printf "*=%s" $src)) }}
{{- $data := dict
    "PATCHY_LISTEN_ADDR" ":8080"
    "PATCHY_LOG_LEVEL" ($vals.config.logLevel | default $g.logLevel)
    "PATCHY_WEBHOOK_SECRET_FILE" "/etc/patchy/webhook/secret"
    "PATCHY_FORWARD_ROUTES" $routes
    "PATCHY_FORWARD_TIMEOUT" $vals.config.forwardTimeout
}}
{{- range $k, $v := $g.extra }}
{{- $_ := set $data $k $v }}
{{- end }}
{{- range $k, $v := $vals.config.extra }}
{{- $_ := set $data $k $v }}
{{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
    name: {{ include "patchy.configMapName" (dict "root" . "name" "webhook-controller") }}
    namespace: {{ .Release.Namespace }}
    labels:
        {{- include "patchy.labels" (dict "root" . "name" "webhook-controller") | nindent 8 }}
    {{- with include "patchy.annotations" (dict "root" .) }}
    annotations:
        {{- . | nindent 8 }}
    {{- end }}
data:
    {{- range $k, $v := $data }}
    {{ $k }}: {{ $v | toString | quote }}
    {{- end }}
{{- if $vals.serviceAccount.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
    name: {{ include "patchy.serviceAccountName" (dict "root" . "name" "webhook-controller" "vals" $vals) }}
    namespace: {{ .Release.Namespace }}
    labels:
        {{- include "patchy.labels" (dict "root" . "name" "webhook-controller") | nindent 8 }}
    {{- with include "patchy.annotations" (dict "root" . "extra" $vals.serviceAccount.annotations) }}
    annotations:
        {{- . | nindent 8 }}
    {{- end }}
automountServiceAccountToken: false
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
    name: {{ include "patchy.fullname" . }}-webhook-controller
    namespace: {{ .Release.Namespace }}
    labels:
        {{- include "patchy.labels" (dict "root" . "name" "webhook-controller" "component" "webhook") | nindent 8 }}
    {{- with include "patchy.annotations" (dict "root" .) }}
    annotations:
        {{- . | nindent 8 }}
    {{- end }}
spec:
    replicas: {{ $vals.replicas }}
    selector:
        matchLabels:
            {{- include "patchy.selectorLabels" (dict "root" . "name" "webhook-controller") | nindent 12 }}
    template:
        metadata:
            labels:
                {{- include "patchy.labels" (dict "root" . "name" "webhook-controller" "component" "webhook") | nindent 16 }}
                {{- with $vals.podLabels }}
                {{- toYaml . | nindent 16 }}
                {{- end }}
            {{- with include "patchy.annotations" (dict "root" . "extra" $vals.podAnnotations) }}
            annotations:
                {{- . | nindent 16 }}
            {{- end }}
        spec:
            serviceAccountName: {{ include "patchy.serviceAccountName" (dict "root" . "name" "webhook-controller" "vals" $vals) }}
            automountServiceAccountToken: false
            {{- with .Values.image.pullSecrets }}
            imagePullSecrets:
                {{- toYaml . | nindent 16 }}
            {{- end }}
            securityContext:
                runAsNonRoot: true
                runAsUser: 65532
                runAsGroup: 65532
                fsGroup: 65532
                fsGroupChangePolicy: Always
                seccompProfile:
                    type: RuntimeDefault
            containers:
                - name: controller
                  image: {{ include "patchy.image" (dict "root" . "binary" "webhook-controller" "image" $vals.image) }}
                  imagePullPolicy: {{ .Values.image.pullPolicy }}
                  args: ["serve"]
                  envFrom:
                      - configMapRef:
                            name: {{ include "patchy.configMapName" (dict "root" . "name" "webhook-controller") }}
                  ports:
                      - name: http
                        containerPort: 8080
                        protocol: TCP
                  livenessProbe:
                      httpGet:
                          path: /healthz
                          port: http
                      initialDelaySeconds: 5
                      periodSeconds: 20
                  readinessProbe:
                      httpGet:
                          path: /readyz
                          port: http
                      initialDelaySeconds: 2
                      periodSeconds: 10
                  {{- with $vals.resources }}
                  resources:
                      {{- toYaml . | nindent 22 }}
                  {{- end }}
                  securityContext:
                      allowPrivilegeEscalation: false
                      readOnlyRootFilesystem: true
                      capabilities:
                          drop: ["ALL"]
                      seccompProfile:
                          type: RuntimeDefault
                  volumeMounts:
                      - name: webhook-secret
                        mountPath: /etc/patchy/webhook
                        readOnly: true
                      - name: tmp
                        mountPath: /tmp
            {{- with $vals.nodeSelector }}
            nodeSelector:
                {{- toYaml . | nindent 16 }}
            {{- end }}
            {{- with $vals.tolerations }}
            tolerations:
                {{- toYaml . | nindent 16 }}
            {{- end }}
            {{- with $vals.affinity }}
            affinity:
                {{- toYaml . | nindent 16 }}
            {{- end }}
            volumes:
                - name: webhook-secret
                  secret:
                      secretName: {{ .Values.github.webhookSecret }}
                - name: tmp
                  emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
    name: {{ include "patchy.fullname" . }}-webhook-controller
    namespace: {{ .Release.Namespace }}
    labels:
        {{- include "patchy.labels" (dict "root" . "name" "webhook-controller") | nindent 8 }}
    {{- with include "patchy.annotations" (dict "root" . "extra" $vals.service.annotations) }}
    annotations:
        {{- . | nindent 8 }}
    {{- end }}
spec:
    type: {{ $vals.service.type }}
    selector:
        {{- include "patchy.selectorLabels" (dict "root" . "name" "webhook-controller") | nindent 8 }}
    ports:
        - name: http
          port: {{ $vals.service.port }}
          targetPort: http
          protocol: TCP
          {{- with $vals.service.nodePort }}
          nodePort: {{ . }}
          {{- end }}
{{- if $vals.networkPolicy.create }}
---
# Webhook + probes in (8080 from anywhere: kubelet probes arrive from the
# node IP, which no pod selector can match, and the ingress controller may
# live in any namespace — the HMAC check is the authentication); DNS, the
# controllers' 8080, and TLS (an OTLP collector) out.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
    name: {{ include "patchy.fullname" . }}-webhook-controller
    namespace: {{ .Release.Namespace }}
    labels:
        {{- include "patchy.labels" (dict "root" . "name" "webhook-controller") | nindent 8 }}
    {{- with include "patchy.annotations" (dict "root" .) }}
    annotations:
        {{- . | nindent 8 }}
    {{- end }}
spec:
    podSelector:
        matchLabels:
            {{- include "patchy.selectorLabels" (dict "root" . "name" "webhook-controller") | nindent 12 }}
    policyTypes: [Ingress, Egress]
    ingress:
        - ports:
              - protocol: TCP
                port: 8080
    egress:
        # DNS.
        - to:
              - namespaceSelector:
                    matchLabels:
                        kubernetes.io/metadata.name: kube-system
          ports:
              - protocol: UDP
                port: 53
              - protocol: TCP
                port: 53
        # The controllers' webhook receivers.
        - to:
              - podSelector:
                    matchLabels:
                        app.kubernetes.io/part-of: patchy
                        app.kubernetes.io/instance: {{ .Release.Name }}
          ports:
              - protocol: TCP
                port: 8080
        # An OTLP collector reached over TLS.
        - ports:
              - protocol: TCP
                port: 443
{{- end }}
