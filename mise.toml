#
# patchy consumes the shared toolchain (bitwise-media-group/toolchain) as the
# .mise/ submodule: pinned tools + the go-cli task archetype come from there,
# and the Makefile is a thin forwarder (.mise/mise.mk). Structural knobs live
# in [vars]; repo-local tasks live in tasks.toml (see [task_config] below).

[settings]
lockfile = true
locked = false
minimum_release_age = "7d"

[vars]
# patchy is multi-binary (six entrypoints under cmd/), so tasks.toml redefines
# the archetype's `build` with a loop; app/app_pkg exist only so the archetype's
# single-app go-build task stays renderable.
app = "patchy"
app_pkg = "./cmd/source-controller"

[task_config]
# Repo-local tasks live in tasks.toml, included AFTER the archetype so its
# same-named task (build) replaces the archetype's definition — an included
# file wins over this config's own [tasks] on name collisions.
includes = [".mise/tasks/go-cli.toml", "tasks.toml"]

# Repo-local tool pins the shared toolchain doesn't carry: the Kubernetes
# code/CRD generator and the envtest binary manager for api/v1alpha1.
# controller-gen floats on its own release line; setup-envtest tracks the
# controller-runtime minor pinned in go.mod (v0.24.x). yq extracts the CRD
# spec schemas into the patchy-config values schema (hack/codegen.sh).
[tools]
"go:sigs.k8s.io/controller-tools/cmd/controller-gen" = "0.21.0"
"go:sigs.k8s.io/controller-runtime/tools/setup-envtest" = "0.24.1"
"aqua:mikefarah/yq" = "4.53.3"
