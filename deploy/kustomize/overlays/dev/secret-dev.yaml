#
# THROWAWAY DEV CREDENTIALS. Nothing here is real, and nothing here may ever
# be copied into an environment that faces the internet. They exist so that
# `kubectl apply -k overlays/dev` produces a stack that STARTS — the
# Integration/Forge CRs in crs-dev.yaml reference patchy-github, and every
# agent Job pod fails with CreateContainerConfigError without
# patchy-anthropic.
#
# To do anything real in dev, overwrite them in the cluster (not in git):
#
#   kubectl -n patchy create secret generic patchy-github \
#     --from-literal=token=<a PAT> \
#     --from-literal=webhookSecret="$(openssl rand -hex 32)" \
#     --dry-run=client -o yaml | kubectl apply -f -
#
#   kubectl -n patchy-agents create secret generic patchy-anthropic \
#     --from-literal=api-key="$ANTHROPIC_API_KEY" \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# (A PAT under the `token` key is the documented dev fallback in
# internal/ghsecret — it wins over App auth. Production uses appID +
# privateKey; see base/secrets.example.yaml.)
---
apiVersion: v1
kind: Secret
metadata:
    name: patchy-github
    namespace: patchy
    labels:
        app.kubernetes.io/part-of: patchy
type: Opaque
stringData:
    # Not a credential. A placeholder so the CRs validate and the receivers
    # start; GitHub calls will fail until it is replaced.
    token: dev-not-a-real-token
    webhookSecret: dev-webhook-secret-replace-me
---
apiVersion: v1
kind: Secret
metadata:
    name: patchy-anthropic
    namespace: patchy-agents
    labels:
        app.kubernetes.io/part-of: patchy
type: Opaque
stringData:
    # internal/jobs ALWAYS wires ANTHROPIC_API_KEY into the agent container
    # from this Secret, whatever harness is configured — so it must exist even
    # for a fake-harness run, and a run that actually calls the model needs a
    # real key here.
    api-key: dev-not-a-real-key
---
apiVersion: v1
kind: Secret
metadata:
    name: patchy-status-auth
    namespace: patchy
    labels:
        app.kubernetes.io/part-of: patchy
type: Opaque
stringData:
    # mode none: the status page is fully open — findings, actions, no
    # sign-in. DEV ONLY: the base ships no auth Secret at all, which serves
    # public rollup statistics and nothing else; production mounts a real
    # oidc config (base/secrets.example.yaml #3).
    config.yaml: |
        mode: none
