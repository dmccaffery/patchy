# Copyright 2026 Bitwise Media Group Ltd.
# SPDX-License-Identifier: MIT
#
# Canned status-page data for dev: one Finding per lifecycle phase plus
# FindingRollup statistics for every scope, ported from the status page's
# demo dataset so the UI renders representative content without running the
# pipeline. Inspect it at the status page after seeding (see below).
#
# Three deliberate properties keep the controllers' hands off this data:
#
#   * spec.suspend: true on every Finding — the context enhancer, the
#     investigation gate, and the remediation spawner all skip suspended
#     findings, so nothing advances a canned phase. (It also means every row
#     wears the `suspended` pill — that is what dev shows.)
#   * no spec.trackingRef — the issue projection only projects findings that
#     carry one, so no GitHub calls are attempted for canned data
#     (status.tracking is still seeded for display).
#   * no status.completedAt on terminal phases — the rollup/TTL loop only
#     aggregates and reaps findings with completedAt set, so canned terminal
#     findings are never folded into the (also canned) rollups and never
#     TTL-deleted (dev's PATCHY_FINDING_TTL is 30m).
#
# `kubectl apply -k overlays/dev` creates the objects but CANNOT set their
# status (a subresource). Seed the statuses with:
#
#     mise run status-demo        # applies this file, then patches statuses
#
# (hack/status-demo.sh; safe to re-run.)
---
