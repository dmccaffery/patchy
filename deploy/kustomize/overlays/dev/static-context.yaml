#
# The fake CMDB. internal/enhancers.StaticFile parses this shape (strictly —
# KnownFields is on, so an unknown key is a startup error) and the
# context-controller records the matching entry on the Finding: attributes
# project as security-context labels, the optional markdown as a sticky
# issue comment.
#
# In a real deployment this is where a CMDB/service-catalogue enhancer would
# plug in instead (pkg/enhance is the seam).
---
apiVersion: v1
kind: ConfigMap
metadata:
    name: patchy-static-context
    namespace: patchy
    labels:
        app.kubernetes.io/name: context-controller
        app.kubernetes.io/part-of: patchy
data:
    cmdb.yaml: |
        repos:
            bitwise-media-group/patchy:
                owners: [dmccaffery]
                attributes:
                    system: patchy
                    tier: "2"
                    environment: dev
                markdown: |
                    Dev deployment of patchy itself — findings here are dogfood.
            acme/shop:
                owners: [octocat, hubot]
                attributes:
                    system: storefront
                    tier: "1"
