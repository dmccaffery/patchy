#
# kind-friendly overlay: local images, a NodePort webhook, minutes instead of
# hours, the fake-CMDB enhancer, the fake harness, and throwaway credentials.
#
#     kind create cluster --config deploy/kind.yaml   # (bring your own; map
#                                                     #  30079 to host)
#     kubectl apply -k deploy/kustomize/overlays/dev
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
    - ../../base
    - static-context.yaml
    - secret-dev.yaml
    - crs-dev.yaml
    - ingress-integration.yaml

# No Cilium component: kind runs kindnet, which honours NetworkPolicy only if
# you swap the CNI. Base NetworkPolicies are applied and simply have no effect
# on a stock kind cluster — do not read a green dev apply as a working sandbox.

# Local images: `make snapshot` builds them (per-arch, unpushed — retag the
# host-arch one as patchy/<name>:dev), then `kind load docker-image patchy/...`.
images:
    - name: ghcr.io/bitwise-media-group/patchy/integration-controller
      newName: patchy/integration-controller
      newTag: dev
    - name: ghcr.io/bitwise-media-group/patchy/source-controller
      newName: patchy/source-controller
      newTag: dev
    - name: ghcr.io/bitwise-media-group/patchy/context-controller
      newName: patchy/context-controller
      newTag: dev
    - name: ghcr.io/bitwise-media-group/patchy/investigation-controller
      newName: patchy/investigation-controller
      newTag: dev
    - name: ghcr.io/bitwise-media-group/patchy/remediation-controller
      newName: patchy/remediation-controller
      newTag: dev
    - name: ghcr.io/bitwise-media-group/patchy/agent-runner
      newName: patchy/agent-runner
      newTag: dev
    - name: ghcr.io/bitwise-media-group/patchy/status-server
      newName: patchy/status-server
      newTag: dev

patches:
    - path: configmap-patch.yaml
    - path: deployment-context-controller-patch.yaml
    # NodePort the integration-controller's webhook receiver. Point your
    # tunnel (smee.io, ngrok, `gh webhook forward`) at 30079; `mise run
    # replay` delivers recorded fixtures to the same port.
    - path: services-nodeport-patch.yaml
      target:
          kind: Service
          name: patchy-integration-controller
    - target:
          kind: Service
          name: patchy-integration-controller
      patch: |
          - op: add
            path: /spec/ports/0/nodePort
            value: 30079
    # Laptop-sized. Requests tiny — a kind node has no headroom. Limits stay
    # (kubescape C-0270/C-0271 gate on them) but loose enough to never
    # throttle a dev loop.
    - target:
          kind: Deployment
          labelSelector: app.kubernetes.io/part-of=patchy
      patch: |
          - op: replace
            path: /spec/template/spec/containers/0/resources
            value:
                requests:
                    cpu: 10m
                    memory: 64Mi
                limits:
                    cpu: "1"
                    memory: 256Mi
