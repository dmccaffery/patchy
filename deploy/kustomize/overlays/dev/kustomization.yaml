#
# kind-friendly overlay: local images, NodePort webhooks, minutes instead of
# hours, the fake-CMDB enhancer, and throwaway credentials.
#
#     kind create cluster --config deploy/kind.yaml   # (bring your own; map
#                                                     #  30079-30082 to host)
#     kubectl apply -k deploy/kustomize/overlays/dev
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
    - ../../base
    - static-context.yaml
    - secret-dev.yaml

# No Cilium component: kind runs kindnet, which honours NetworkPolicy only if
# you swap the CNI. Base NetworkPolicies are applied and simply have no effect
# on a stock kind cluster — do not read a green dev apply as a working sandbox.

# Local images: `make snapshot` builds them (per-arch, unpushed — retag the
# host-arch one as patchy/<name>:dev), then `kind load docker-image patchy/...`.
images:
    - name: ghcr.io/bitwise-media-group/patchy/source-controller
      newName: patchy/source-controller
      newTag: dev
    - name: ghcr.io/bitwise-media-group/patchy/context-controller
      newName: patchy/context-controller
      newTag: dev
    - name: ghcr.io/bitwise-media-group/patchy/remediation-controller
      newName: patchy/remediation-controller
      newTag: dev
    - name: ghcr.io/bitwise-media-group/patchy/webhook-controller
      newName: patchy/webhook-controller
      newTag: dev
    - name: ghcr.io/bitwise-media-group/patchy/agent-runner
      newName: patchy/agent-runner
      newTag: dev

patches:
    - path: configmap-patch.yaml
    - path: deployment-context-controller-patch.yaml
    - path: services-nodeport-patch.yaml
      target:
          kind: Service
          name: patchy-webhook-controller
    - path: services-nodeport-patch.yaml
      target:
          kind: Service
          name: patchy-source-controller
    - path: services-nodeport-patch.yaml
      target:
          kind: Service
          name: patchy-context-controller
    - path: services-nodeport-patch.yaml
      target:
          kind: Service
          name: patchy-remediation-controller
    # Distinct nodePorts. Point your tunnel (smee.io, ngrok, `gh webhook
    # forward`) at 30079 — the webhook-controller routes deliveries to the right
    # controllers, exactly as in production. 30080-30082 hit the controllers
    # directly, which `mise run replay` uses to exercise one in isolation.
    - target:
          kind: Service
          name: patchy-webhook-controller
      patch: |
          - op: add
            path: /spec/ports/0/nodePort
            value: 30079
    - target:
          kind: Service
          name: patchy-source-controller
      patch: |
          - op: add
            path: /spec/ports/0/nodePort
            value: 30080
    - target:
          kind: Service
          name: patchy-context-controller
      patch: |
          - op: add
            path: /spec/ports/0/nodePort
            value: 30081
    - target:
          kind: Service
          name: patchy-remediation-controller
      patch: |
          - op: add
            path: /spec/ports/0/nodePort
            value: 30082
    # Laptop-sized. Requests tiny — a kind node has no headroom. Limits stay
    # (kubescape C-0270/C-0271 gate on them) but loose enough to never
    # throttle a dev loop.
    - target:
          kind: Deployment
          labelSelector: app.kubernetes.io/part-of=patchy
      patch: |
          - op: replace
            path: /spec/template/spec/containers/0/resources
            value:
                requests:
                    cpu: 10m
                    memory: 64Mi
                limits:
                    cpu: "1"
                    memory: 256Mi
