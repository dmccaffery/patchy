#
# Defence in depth for the agent sandbox, for GKE Dataplane V2 clusters — the
# same allowlist as ../cilium, in the dialect GKE actually enforces.
#
# Dataplane V2 IS Cilium, but it has not honoured the CiliumNetworkPolicy CRD
# since 1.21.5-gke.1300 and rejects every L7 rule, which is what ../cilium's
# toFQDNs and rules.dns blocks are. Applying that component to a GKE cluster
# gets you an object that enforces nothing while reading as protection.
# FQDNNetworkPolicy is the supported equivalent: anetd snoops the pod's DNS
# answers and programs the resolved addresses, the same trick Cilium's DNS
# proxy plays.
#
# REQUIRES the cluster to be created or updated with
# `--enable-fqdn-network-policy` (Dataplane V2, plus kube-dns or Cloud DNS; on
# Standard clusters restart the anetd DaemonSet afterwards). Without the flag
# the CRD does not exist and this component fails to apply — loudly, which is
# the failure mode you want.
#
# What this covers, and what it does NOT:
#
#   * The agent container's own model API on 443 — one policy per harness,
#     selecting that harness's pods by their patchy.bitwisemedia.uk/harness
#     label, so a claude pod reaches only api.anthropic.com and a codex pod
#     only api.openai.com. No forge host appears; the pod never talks to
#     GitHub.
#   * NOT DNS and NOT the artifact server. FQDN policies are egress-only and
#     cannot name a resolver or select a ClusterIP Service, so both still come
#     from base/networkpolicy.yaml — which kustomization.yaml keeps, minus its
#     broad 443 rule.
#
# The codex policy is inert until the codex runner is enabled (no codex pod
# carries the label otherwise).
---
apiVersion: networking.gke.io/v1alpha1
kind: FQDNNetworkPolicy
metadata:
    name: patchy-agent-egress-claude
    namespace: patchy-agents
    labels:
        app.kubernetes.io/part-of: patchy
spec:
    podSelector:
        matchLabels:
            app.kubernetes.io/name: patchy-agent
            app.kubernetes.io/managed-by: patchy
            patchy.bitwisemedia.uk/harness: claude
    egress:
        # The agent container: the claude harness's model API and nothing else.
        - matches:
              - name: api.anthropic.com
          ports:
              - protocol: TCP
                port: 443
---
apiVersion: networking.gke.io/v1alpha1
kind: FQDNNetworkPolicy
metadata:
    name: patchy-agent-egress-codex
    namespace: patchy-agents
    labels:
        app.kubernetes.io/part-of: patchy
spec:
    podSelector:
        matchLabels:
            app.kubernetes.io/name: patchy-agent
            app.kubernetes.io/managed-by: patchy
            patchy.bitwisemedia.uk/harness: codex
    egress:
        # The agent container: the codex harness's model API and nothing else.
        - matches:
              - name: api.openai.com
          ports:
              - protocol: TCP
                port: 443
