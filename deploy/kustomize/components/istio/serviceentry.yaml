#
# The egress allowlist: the only hosts REGISTRY_ONLY (sidecar.yaml) lets an
# agent pod reach. Same list as the Cilium component's toFQDNs.
#
# exportTo: "." keeps each entry private to patchy-agents — no other
# namespace's sidecar config grows an api.anthropic.com route because of the
# agent sandbox.
---
# The agent container: `claude -p` and nothing else.
apiVersion: networking.istio.io/v1
kind: ServiceEntry
metadata:
    name: patchy-agent-anthropic
    namespace: patchy-agents
    labels:
        app.kubernetes.io/part-of: patchy
spec:
    exportTo: ["."]
    hosts:
        - api.anthropic.com
    location: MESH_EXTERNAL
    resolution: DNS
    ports:
        - number: 443
          name: tls
          protocol: TLS
---
# The INIT container's clone. github.com serves the git protocol;
# codeload/objects serve the pack data a `git clone --depth 1` pulls.
# If you run GHES, replace these with your GHES hostname.
apiVersion: networking.istio.io/v1
kind: ServiceEntry
metadata:
    name: patchy-agent-github
    namespace: patchy-agents
    labels:
        app.kubernetes.io/part-of: patchy
spec:
    exportTo: ["."]
    hosts:
        - github.com
        - codeload.github.com
        - objects.githubusercontent.com
    location: MESH_EXTERNAL
    resolution: DNS
    ports:
        - number: 443
          name: tls
          protocol: TLS
