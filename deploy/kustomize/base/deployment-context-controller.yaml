---
apiVersion: apps/v1
kind: Deployment
metadata:
    name: patchy-context-controller
    namespace: patchy
    labels:
        app: context-controller
        app.kubernetes.io/name: context-controller
        app.kubernetes.io/part-of: patchy
        app.kubernetes.io/component: controller
spec:
    # Singleton, Recreate: see deployment-source-controller.yaml. Two replicas
    # would double-comment the enhancement on the same issue.
    replicas: 1
    strategy:
        type: Recreate
    selector:
        matchLabels:
            app.kubernetes.io/name: context-controller
            app.kubernetes.io/part-of: patchy
    template:
        metadata:
            labels:
                app: context-controller
                app.kubernetes.io/name: context-controller
                app.kubernetes.io/part-of: patchy
                app.kubernetes.io/component: controller
        spec:
            serviceAccountName: patchy-context-controller
            automountServiceAccountToken: false
            securityContext:
                runAsNonRoot: true
                runAsUser: 65532
                runAsGroup: 65532
                fsGroup: 65532
                seccompProfile:
                    type: RuntimeDefault
            containers:
                - name: controller
                  # Dockerfile.controller (repo root)
                  # (TARGET=context-controller, RUNTIME=static in .goreleaser.yaml).
                  image: ghcr.io/bitwise-media-group/patchy/context-controller:latest
                  args: ["serve"]
                  envFrom:
                      - configMapRef:
                            name: patchy-config
                  env:
                      - name: PATCHY_GITHUB_APP_ID
                        valueFrom:
                            secretKeyRef:
                                name: patchy-github-app
                                key: app-id
                  ports:
                      - name: http
                        containerPort: 8080
                        protocol: TCP
                  livenessProbe:
                      httpGet:
                          path: /healthz
                          port: http
                      initialDelaySeconds: 5
                      periodSeconds: 20
                  readinessProbe:
                      httpGet:
                          path: /readyz
                          port: http
                      initialDelaySeconds: 2
                      periodSeconds: 10
                  resources:
                      requests:
                          cpu: 50m
                          memory: 96Mi
                      limits:
                          cpu: 500m
                          memory: 256Mi
                  securityContext:
                      allowPrivilegeEscalation: false
                      readOnlyRootFilesystem: true
                      capabilities:
                          drop: ["ALL"]
                      seccompProfile:
                          type: RuntimeDefault
                  volumeMounts:
                      - name: webhook-secret
                        mountPath: /etc/patchy/webhook
                        readOnly: true
                      - name: github-app
                        mountPath: /etc/patchy/github-app
                        readOnly: true
                      - name: tmp
                        mountPath: /tmp
            volumes:
                - name: webhook-secret
                  secret:
                      secretName: patchy-webhook-secret
                - name: github-app
                  secret:
                      secretName: patchy-github-app
                      defaultMode: 0400
                - name: tmp
                  emptyDir: {}
