---
# Every controller is a Kubernetes controller now — the CRs in the patchy
# namespace are the state machine — so every controller identity mounts its
# token. What each identity may do is pinned, verb by verb, in rbac.yaml.
apiVersion: v1
kind: ServiceAccount
metadata:
    name: patchy-integration-controller
    namespace: patchy
    labels:
        app.kubernetes.io/name: integration-controller
        app.kubernetes.io/part-of: patchy
---
apiVersion: v1
kind: ServiceAccount
metadata:
    name: patchy-source-controller
    namespace: patchy
    labels:
        app.kubernetes.io/name: source-controller
        app.kubernetes.io/part-of: patchy
---
apiVersion: v1
kind: ServiceAccount
metadata:
    name: patchy-context-controller
    namespace: patchy
    labels:
        app.kubernetes.io/name: context-controller
        app.kubernetes.io/part-of: patchy
---
apiVersion: v1
kind: ServiceAccount
metadata:
    name: patchy-investigation-controller
    namespace: patchy
    labels:
        app.kubernetes.io/name: investigation-controller
        app.kubernetes.io/part-of: patchy
---
apiVersion: v1
kind: ServiceAccount
metadata:
    name: patchy-remediation-controller
    namespace: patchy
    labels:
        app.kubernetes.io/name: remediation-controller
        app.kubernetes.io/part-of: patchy
---
apiVersion: v1
kind: ServiceAccount
metadata:
    name: patchy-status-server
    namespace: patchy
    labels:
        app.kubernetes.io/name: status-server
        app.kubernetes.io/part-of: patchy
---
# The identity the agent Job pods run as (internal/jobs default
# --agent-service-account=patchy-agent). The agent needs NO Kubernetes API
# access whatsoever, so no Role is bound to it and its token is not mounted —
# a prompt-injected agent must not be able to read the very Secrets the
# isolation model depends on.
apiVersion: v1
kind: ServiceAccount
metadata:
    name: patchy-agent
    namespace: patchy-agents
    labels:
        app.kubernetes.io/name: patchy-agent
        app.kubernetes.io/part-of: patchy
automountServiceAccountToken: false
