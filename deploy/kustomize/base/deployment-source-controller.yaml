---
apiVersion: apps/v1
kind: Deployment
metadata:
    name: patchy-source-controller
    namespace: patchy
    labels:
        app: source-controller
        app.kubernetes.io/name: source-controller
        app.kubernetes.io/part-of: patchy
        app.kubernetes.io/component: controller
spec:
    # One replica, and Recreate rather than RollingUpdate.
    #
    # The state machine is GitHub issue labels: a controller "holds a lease"
    # only in the sense that it moves an issue between label states, and two
    # replicas would both act on the same unlabelled issue (the accumulation
    # window is keyed on the security-advisory label, so a race opens two
    # issues for one finding type). There is no leader election in the
    # binaries — singleton-by-construction is the mechanism.
    replicas: 1
    strategy:
        type: Recreate
    selector:
        matchLabels:
            app.kubernetes.io/name: source-controller
            app.kubernetes.io/part-of: patchy
    template:
        metadata:
            labels:
                app: source-controller
                app.kubernetes.io/name: source-controller
                app.kubernetes.io/part-of: patchy
                app.kubernetes.io/component: controller
        spec:
            serviceAccountName: patchy-source-controller
            automountServiceAccountToken: false
            securityContext:
                runAsNonRoot: true
                runAsUser: 65532
                runAsGroup: 65532
                fsGroup: 65532
                seccompProfile:
                    type: RuntimeDefault
            containers:
                - name: controller
                  # Built from Dockerfile.controller (repo root)
                  # (TARGET=source-controller, RUNTIME=static in .goreleaser.yaml).
                  image: ghcr.io/bitwise-media-group/patchy/source-controller:latest
                  args: ["serve"]
                  envFrom:
                      - configMapRef:
                            name: patchy-config
                  env:
                      - name: PATCHY_GITHUB_APP_ID
                        valueFrom:
                            secretKeyRef:
                                name: patchy-github-app
                                key: app-id
                  ports:
                      - name: http
                        containerPort: 8080
                        protocol: TCP
                  livenessProbe:
                      httpGet:
                          path: /healthz
                          port: http
                      initialDelaySeconds: 5
                      periodSeconds: 20
                  readinessProbe:
                      httpGet:
                          path: /readyz
                          port: http
                      initialDelaySeconds: 2
                      periodSeconds: 10
                  resources:
                      requests:
                          cpu: 50m
                          memory: 96Mi
                      limits:
                          cpu: 500m
                          memory: 256Mi
                  securityContext:
                      allowPrivilegeEscalation: false
                      readOnlyRootFilesystem: true
                      capabilities:
                          drop: ["ALL"]
                      seccompProfile:
                          type: RuntimeDefault
                  volumeMounts:
                      - name: webhook-secret
                        mountPath: /etc/patchy/webhook
                        readOnly: true
                      - name: github-app
                        mountPath: /etc/patchy/github-app
                        readOnly: true
                      - name: tmp
                        mountPath: /tmp
            volumes:
                - name: webhook-secret
                  secret:
                      secretName: patchy-webhook-secret
                - name: github-app
                  secret:
                      secretName: patchy-github-app
                      defaultMode: 0400
                # The root filesystem is read-only; Go's os.CreateTemp and the
                # HTTP stack want a writable /tmp.
                - name: tmp
                  emptyDir: {}
