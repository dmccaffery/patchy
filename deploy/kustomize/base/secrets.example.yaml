# EXAMPLE ONLY — every resource here is commented out, and this file is NOT in
# kustomization.yaml's resources list. It documents the Secrets patchy
# expects; it does not create them.
#
# Do not put real values in git. Use SOPS (age/KMS-encrypted, decrypted by
# your GitOps tooling or `sops -d | kubectl apply -f -`) or
# external-secrets.io with your own vault as the backing store, and reference
# them from an overlay. Plain `kubectl create secret` is fine for kind/dev.
#
# ---------------------------------------------------------------------------
# 1. patchy-github  (namespace: patchy)
#
# The GitHub credential, referenced by CUSTOM RESOURCES, not by Deployments:
# an Integration's spec.secretRef names it for webhook validation + issue
# projection + alert ingestion; a Forge's spec.secretRef names it (or a
# separate one) for repository clone/push access. One Secret may serve both,
# or you may split read and write identities across two GitHub Apps.
#
# Keys (internal/ghsecret):
#   appID + privateKey   GitHub App auth — the production mode. Tokens are
#                        minted per-installation, scoped per-repository.
#   token                a personal-access-token fallback (dev only; wins
#                        over App auth when set).
#   webhookSecret        the HMAC secret configured on the App's webhook
#                        (Integration secrets only; Forge ignores it).
#
# kubectl -n patchy create secret generic patchy-github \
#   --from-literal=appID=123456 \
#   --from-file=privateKey=./patchy.2026-01-01.private-key.pem \
#   --from-literal=webhookSecret="$(openssl rand -hex 32)"
#
# apiVersion: v1
# kind: Secret
# metadata:
#     name: patchy-github
#     namespace: patchy
# type: Opaque
# stringData:
#     appID: "123456"
#     privateKey: |
#         -----BEGIN RSA PRIVATE KEY-----
#         ...the App's private key, downloaded once at App creation...
#         -----END RSA PRIVATE KEY-----
#     webhookSecret: "0123456789abcdef...  # openssl rand -hex 32"
#
# ---------------------------------------------------------------------------
# 2. patchy-anthropic  (namespace: patchy-agents — NOT patchy)
#
# The model credential. It lives in the AGENT namespace because it is consumed
# by the agent Job pods, not by the controllers: internal/jobs always appends
#   $PATCHY_ANTHROPIC_SECRET_ENV <- secretKeyRef{name: $PATCHY_ANTHROPIC_SECRET,
#                                                key:  $PATCHY_ANTHROPIC_SECRET_KEY}
# to the agent container. If this Secret is missing, every agent Job pod fails
# to start with CreateContainerConfigError.
#
# The name/key/env are configurable (PATCHY_ANTHROPIC_SECRET /
# PATCHY_ANTHROPIC_SECRET_KEY / PATCHY_ANTHROPIC_SECRET_ENV in
# configmap.yaml); the defaults are below. The value may be an Anthropic API
# key (injected as ANTHROPIC_API_KEY, the default) or a long-lived OAuth
# token minted with `claude setup-token` (set PATCHY_ANTHROPIC_SECRET_ENV to
# CLAUDE_CODE_OAUTH_TOKEN).
#
# kubectl -n patchy-agents create secret generic patchy-anthropic \
#   --from-literal=api-key="sk-ant-..."
#
# apiVersion: v1
# kind: Secret
# metadata:
#     name: patchy-anthropic
#     namespace: patchy-agents
# type: Opaque
# stringData:
#     api-key: "sk-ant-..."
#
# ---------------------------------------------------------------------------
# 3. patchy-status-auth  (namespace: patchy)
#
# The status server's authentication configuration, mounted at
# /etc/patchy/auth (deployment-status-server.yaml; the volume is optional).
# WITHOUT this Secret the status page serves rollup statistics only: no
# findings, no actions, no sign-in. With it, the findings surface opens to
# authenticated users whose RBAC grants viewing (rbac.users.example.yaml).
#
# Key: config.yaml. Modes:
#   none       full access, no sign-in — development only (the dev overlay
#              ships this).
#   anonymous  one fixed identity for every visitor; RBAC still applies.
#   oidc       the real SSO flow (below). The clientSecret also keys the
#              session-cookie encryption: rotating it signs everyone out.
#
# kubectl -n patchy create secret generic patchy-status-auth \
#   --from-file=config.yaml=./status-auth.yaml
#
# apiVersion: v1
# kind: Secret
# metadata:
#     name: patchy-status-auth
#     namespace: patchy
# type: Opaque
# stringData:
#     config.yaml: |
#         mode: oidc
#         sessionDuration: 168h
#         oidc:
#             issuerURL: https://sso.example.com
#             clientID: patchy-status
#             clientSecret: "..."
#             # scopes: [openid, offline_access, profile, email, groups]
#             # autoLogin: true
#             # redirectURL: https://patchy-status.example.com/oauth2/callback
#             # claims: {username: email, groups: groups, displayName: name}
#
# ---------------------------------------------------------------------------
# There is deliberately NO GitHub credential in the patchy-agents namespace —
# not even a per-Job one. The agent's init container fetches the repository
# as a digest-verified tarball from source-controller's artifact server; the
# per-Job Secret carries only handoff markdown. That absence is the isolation
# model — see networkpolicy.yaml.
