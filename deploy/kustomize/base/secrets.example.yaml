#
# EXAMPLE ONLY — every resource here is commented out, and this file is NOT in
# kustomization.yaml's resources list. It documents the three Secrets patchy
# expects; it does not create them.
#
# Do not put real values in git. Use SOPS (age/KMS-encrypted, decrypted by
# Flux's sops decryption or `sops -d | kubectl apply -f -`) or
# external-secrets.io with your own vault as the backing store, and reference
# them from an overlay. Plain `kubectl create secret` is fine for kind/dev.
#
# ---------------------------------------------------------------------------
# 1. patchy-github-app  (namespace: patchy)
#
# The GitHub App identity. All three controllers read it: app-id lands in
# PATCHY_GITHUB_APP_ID (env, secretKeyRef), private-key.pem is projected as a
# file at /etc/patchy/github-app/private-key.pem and named by
# PATCHY_GITHUB_APP_PRIVATE_KEY_FILE.
#
# kubectl -n patchy create secret generic patchy-github-app \
#   --from-literal=app-id=123456 \
#   --from-file=private-key.pem=./patchy.2026-01-01.private-key.pem
#
# apiVersion: v1
# kind: Secret
# metadata:
#     name: patchy-github-app
#     namespace: patchy
# type: Opaque
# stringData:
#     app-id: "123456"
#     private-key.pem: |
#         -----BEGIN RSA PRIVATE KEY-----
#         ...the App's private key, downloaded once at App creation...
#         -----END RSA PRIVATE KEY-----
#
# ---------------------------------------------------------------------------
# 2. patchy-webhook-secret  (namespace: patchy)
#
# The shared HMAC secret configured on the App's webhook. Projected at
# /etc/patchy/webhook/secret (PATCHY_WEBHOOK_SECRET_FILE); internal/webhook
# validates X-Hub-Signature-256 against it and 401s anything else. The same
# value must be set on all three webhook URLs.
#
# kubectl -n patchy create secret generic patchy-webhook-secret \
#   --from-literal=secret="$(openssl rand -hex 32)"
#
# apiVersion: v1
# kind: Secret
# metadata:
#     name: patchy-webhook-secret
#     namespace: patchy
# type: Opaque
# stringData:
#     secret: "0123456789abcdef...  # openssl rand -hex 32"
#
# ---------------------------------------------------------------------------
# 3. patchy-anthropic  (namespace: patchy-agents — NOT patchy)
#
# The model credential. It lives in the AGENT namespace because it is consumed
# by the agent Job pods, not by the controllers: internal/jobs always appends
#   $PATCHY_ANTHROPIC_SECRET_ENV <- secretKeyRef{name: $PATCHY_ANTHROPIC_SECRET,
#                                                key:  $PATCHY_ANTHROPIC_SECRET_KEY}
# to the agent container. If this Secret is missing, every agent Job pod fails
# to start with CreateContainerConfigError.
#
# The name/key/env are configurable (PATCHY_ANTHROPIC_SECRET /
# PATCHY_ANTHROPIC_SECRET_KEY / PATCHY_ANTHROPIC_SECRET_ENV in
# configmap.yaml); the defaults are below. The value may be an Anthropic API
# key (injected as ANTHROPIC_API_KEY, the default) or a long-lived OAuth
# token minted with `claude setup-token` (set PATCHY_ANTHROPIC_SECRET_ENV to
# CLAUDE_CODE_OAUTH_TOKEN).
#
# kubectl -n patchy-agents create secret generic patchy-anthropic \
#   --from-literal=api-key="sk-ant-..."
#
# apiVersion: v1
# kind: Secret
# metadata:
#     name: patchy-anthropic
#     namespace: patchy-agents
# type: Opaque
# stringData:
#     api-key: "sk-ant-..."
#
# ---------------------------------------------------------------------------
# There is deliberately NO GitHub credential in the patchy-agents namespace.
# The agent's per-Job Secret (a short-lived, scoped installation token) is
# created and owner-referenced by the remediation-controller at Job creation
# and dies with the Job; it is mounted into the init container only. That
# absence is the isolation model — see networkpolicy.yaml.
