#
# RBAC, in full. One Role (+ RoleBinding) per controller in the patchy
# namespace, verb-by-verb what its reconcilers use, plus one Role in
# patchy-agents for each of the two job controllers.
#
# Conventions the rules encode:
#
#   * The CRs are the state machine. Writers are exclusive per field — the
#     transition table in DESIGN.md says which controller writes which edge —
#     and the verbs here enforce the split at the API layer as far as RBAC
#     can (RBAC is per-resource, not per-field; the reviewable writer table
#     is the finer-grained control).
#   * secrets get (never list/watch): provider/forge credentials are read on
#     demand by name through the API reader (internal/kube disables the
#     Secret cache), so no controller can enumerate Secrets.
#   * leases + events: controller-runtime leader election. Deployments stay
#     replicas:1 + Recreate; the lease is insurance against two replicas
#     racing during a botched rollout.
#   * The agent pods (patchy-agents) have NO role at all — see
#     serviceaccount.yaml.
---
# ---- integration-controller ------------------------------------------------
# Ingests scanner webhooks into Findings (create/fold/duplicate-merge —
# the one deleter of duplicate Findings), projects Findings to tracking
# issues (reads the children's reports), and applies human signals
# (approve/close/PR-merge) to Finding spec + status.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
    name: patchy-integration-controller
    namespace: patchy
    labels:
        app.kubernetes.io/name: integration-controller
        app.kubernetes.io/part-of: patchy
rules:
    - apiGroups: [patchy.bitwisemedia.uk]
      resources: [findings]
      verbs: [create, get, list, watch, update, patch, delete]
    - apiGroups: [patchy.bitwisemedia.uk]
      resources: [findings/status]
      verbs: [get, update, patch]
    - apiGroups: [patchy.bitwisemedia.uk]
      resources: [integrations]
      verbs: [get, list, watch]
    - apiGroups: [patchy.bitwisemedia.uk]
      resources: [integrations/status]
      verbs: [get, update, patch]
    - apiGroups: [patchy.bitwisemedia.uk]
      resources: [investigations, remediations]
      verbs: [get, list, watch]
    - apiGroups: [""]
      resources: [secrets]
      verbs: [get]
    - apiGroups: [coordination.k8s.io]
      resources: [leases]
      verbs: [get, create, update]
    - apiGroups: [""]
      resources: [events]
      verbs: [create, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
    name: patchy-integration-controller
    namespace: patchy
    labels:
        app.kubernetes.io/name: integration-controller
        app.kubernetes.io/part-of: patchy
roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: Role
    name: patchy-integration-controller
subjects:
    - kind: ServiceAccount
      name: patchy-integration-controller
      namespace: patchy
---
# ---- source-controller -----------------------------------------------------
# Validates Forge credentials, resolves + pins Repositories, serves the
# artifact tarballs. Writes only Forge/Repository status.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
    name: patchy-source-controller
    namespace: patchy
    labels:
        app.kubernetes.io/name: source-controller
        app.kubernetes.io/part-of: patchy
rules:
    - apiGroups: [patchy.bitwisemedia.uk]
      resources: [forges, repositories]
      verbs: [get, list, watch]
    - apiGroups: [patchy.bitwisemedia.uk]
      resources: [forges/status, repositories/status]
      verbs: [get, update, patch]
    - apiGroups: [""]
      resources: [secrets]
      verbs: [get]
    - apiGroups: [coordination.k8s.io]
      resources: [leases]
      verbs: [get, create, update]
    - apiGroups: [""]
      resources: [events]
      verbs: [create, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
    name: patchy-source-controller
    namespace: patchy
    labels:
        app.kubernetes.io/name: source-controller
        app.kubernetes.io/part-of: patchy
roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: Role
    name: patchy-source-controller
subjects:
    - kind: ServiceAccount
      name: patchy-source-controller
      namespace: patchy
---
# ---- context-controller ----------------------------------------------------
