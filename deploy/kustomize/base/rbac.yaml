apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
    name: patchy-context-controller
    namespace: patchy
    labels:
        app.kubernetes.io/name: context-controller
        app.kubernetes.io/part-of: patchy
rules:
    - apiGroups: [patchy.bitwisemedia.uk]
      resources: [findings]
      verbs: [get, list, watch]
    - apiGroups: [patchy.bitwisemedia.uk]
      resources: [findings/status]
      verbs: [get, update, patch]
    - apiGroups: [coordination.k8s.io]
      resources: [leases]
      verbs: [get, create, update]
    - apiGroups: [""]
      resources: [events]
      verbs: [create, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
    name: patchy-context-controller
    namespace: patchy
    labels:
        app.kubernetes.io/name: context-controller
        app.kubernetes.io/part-of: patchy
roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: Role
    name: patchy-context-controller
subjects:
    - kind: ServiceAccount
      name: patchy-context-controller
      namespace: patchy
---
# ---- investigation-controller ----------------------------------------------
# The gate (creates Repository + Investigation, parks repo-less findings) and
# the analysis scheduler (launches agent Jobs, stamps results, routes the
# verdict edges on Finding status).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
    name: patchy-investigation-controller
    namespace: patchy
    labels:
        app.kubernetes.io/name: investigation-controller
        app.kubernetes.io/part-of: patchy
rules:
    - apiGroups: [patchy.bitwisemedia.uk]
      resources: [findings]
      verbs: [get, list, watch]
    - apiGroups: [patchy.bitwisemedia.uk]
      resources: [findings/status]
      verbs: [get, update, patch]
    - apiGroups: [patchy.bitwisemedia.uk]
      resources: [investigations]
      verbs: [create, get, list, watch, update, patch]
    - apiGroups: [patchy.bitwisemedia.uk]
      resources: [investigations/status]
      verbs: [get, update, patch]
    - apiGroups: [patchy.bitwisemedia.uk]
      resources: [repositories]
      verbs: [create, get, list, watch]
    - apiGroups: [patchy.bitwisemedia.uk]
      resources: [forges]
      verbs: [get, list, watch]
    - apiGroups: [""]
      resources: [secrets]
      verbs: [get]
    - apiGroups: [coordination.k8s.io]
      resources: [leases]
      verbs: [get, create, update]
    - apiGroups: [""]
      resources: [events]
      verbs: [create, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
    name: patchy-investigation-controller
    namespace: patchy
    labels:
        app.kubernetes.io/name: investigation-controller
        app.kubernetes.io/part-of: patchy
roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: Role
    name: patchy-investigation-controller
subjects:
    - kind: ServiceAccount
      name: patchy-investigation-controller
      namespace: patchy
---
# ---- remediation-controller ------------------------------------------------
# Queue admission + the remediation scheduler + push/PR, and the rollup/TTL
# loop. The one deleter of expired Findings (cascade deletes the children);
# `update` on findings/investigations/remediations (not just status) is the
# rollup finalizer removal.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
    name: patchy-remediation-controller
    namespace: patchy
    labels:
        app.kubernetes.io/name: remediation-controller
        app.kubernetes.io/part-of: patchy
rules:
    - apiGroups: [patchy.bitwisemedia.uk]
      resources: [findings]
      verbs: [get, list, watch, update, patch, delete]
    - apiGroups: [patchy.bitwisemedia.uk]
      resources: [findings/status]
      verbs: [get, update, patch]
    - apiGroups: [patchy.bitwisemedia.uk]
      resources: [remediations]
      verbs: [create, get, list, watch, update, patch]
    - apiGroups: [patchy.bitwisemedia.uk]
      resources: [remediations/status]
      verbs: [get, update, patch]
    - apiGroups: [patchy.bitwisemedia.uk]
      resources: [investigations]
      verbs: [get, list, watch, update, patch]
    - apiGroups: [patchy.bitwisemedia.uk]
      resources: [investigations/status]
      verbs: [get, update, patch]
    - apiGroups: [patchy.bitwisemedia.uk]
      resources: [repositories]
      verbs: [get, list, watch]
    - apiGroups: [patchy.bitwisemedia.uk]
      resources: [findingrollups]
      verbs: [create, get, list, watch, update, patch]
    - apiGroups: [patchy.bitwisemedia.uk]
      resources: [findingrollups/status]
      verbs: [get, update, patch]
    - apiGroups: [patchy.bitwisemedia.uk]
      resources: [forges]
      verbs: [get, list, watch]
    - apiGroups: [""]
      resources: [secrets]
      verbs: [get]
    - apiGroups: [coordination.k8s.io]
      resources: [leases]
      verbs: [get, create, update]
    - apiGroups: [""]
      resources: [events]
      verbs: [create, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
    name: patchy-remediation-controller
    namespace: patchy
    labels:
        app.kubernetes.io/name: remediation-controller
        app.kubernetes.io/part-of: patchy
roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: Role
    name: patchy-remediation-controller
subjects:
    - kind: ServiceAccount
      name: patchy-remediation-controller
      namespace: patchy
---
# ---- status-server ----------------------------------------------------------
# The status page backend: reads Findings/FindingRollups for the projection
# and writes Finding SPEC only — approve records spec.approval, suspend and
# resume toggle spec.suspend. Deliberately NO findings/status: the status
# server never moves a phase (the transition table's writers stay exclusive),
# and RBAC enforces that at the API layer. No leases (no reconcilers, no
# leader election), no secrets (the auth config is a mounted volume).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
    name: patchy-status-server
    namespace: patchy
    labels:
        app.kubernetes.io/name: status-server
        app.kubernetes.io/part-of: patchy
rules:
    - apiGroups: [patchy.bitwisemedia.uk]
      resources: [findings]
      verbs: [get, list, watch, update, patch]
    - apiGroups: [patchy.bitwisemedia.uk]
      resources: [findingrollups]
      verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
    name: patchy-status-server
    namespace: patchy
    labels:
        app.kubernetes.io/name: status-server
        app.kubernetes.io/part-of: patchy
roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: Role
    name: patchy-status-server
subjects:
    - kind: ServiceAccount
      name: patchy-status-server
      namespace: patchy
---
# The one ClusterRole in the base: SubjectAccessReview is a cluster-scoped,
# non-namespaced create-only API, so a namespaced Role cannot grant it. The
# status server uses it to answer "may user U <verb> findings in patchy?"
# for the signed-in user — the custom verbs (approve, suspend, resume) and
# the native get that gates viewing (see rbac.users.example.yaml for the
# grant grammar). Review-only: this confers no power to act, only to ask.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
    name: patchy-status-server-authz
    labels:
        app.kubernetes.io/name: status-server
        app.kubernetes.io/part-of: patchy
rules:
    - apiGroups: [authorization.k8s.io]
      resources: [subjectaccessreviews]
      verbs: [create]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
    name: patchy-status-server-authz
    labels:
        app.kubernetes.io/name: status-server
        app.kubernetes.io/part-of: patchy
roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: ClusterRole
    name: patchy-status-server-authz
subjects:
    - kind: ServiceAccount
      name: patchy-status-server
      namespace: patchy
---
# ---- patchy-agents: the two job controllers --------------------------------
# What internal/jobs uses, and nothing more:
#   jobs      create (Create), get/list/watch (status + orphan reap), delete
#   pods      get/list/watch (find the Job's pod)
#   pods/log  get (read the PATCHY-EVENT: stream at Job completion)
#   secrets   create/get/update/delete (the per-Job Secret carrying the
#             handoff markdown — credential-less; update owner-references it
#             to its Job, delete is the create-Job-failed rollback)
# No secrets list/watch: each controller only ever addresses its own per-Job
# Secret by name. The two controllers share the namespace; the
# patchy.bitwisemedia.uk/kind Job label keeps their watches and reapers out
# of each other's way (RBAC cannot express that split).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
    name: patchy-agent-jobs
    namespace: patchy-agents
    labels:
        app.kubernetes.io/part-of: patchy
rules:
    - apiGroups: [batch]
      resources: [jobs]
      verbs: [create, get, list, watch, delete]
    - apiGroups: [""]
      resources: [pods]
      verbs: [get, list, watch]
    - apiGroups: [""]
      resources: [pods/log]
      verbs: [get]
    - apiGroups: [""]
      resources: [secrets]
      verbs: [create, get, update, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
    name: patchy-agent-jobs
    namespace: patchy-agents
    labels:
        app.kubernetes.io/part-of: patchy
roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: Role
    name: patchy-agent-jobs
subjects:
    - kind: ServiceAccount
      name: patchy-investigation-controller
      namespace: patchy
    - kind: ServiceAccount
      name: patchy-remediation-controller
      namespace: patchy
